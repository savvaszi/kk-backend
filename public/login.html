<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KryptoKnight — Admin Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b0e; color: #e8eaf0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #13161d; border: 1px solid #1e2230; border-radius: 16px; padding: 44px 40px; width: 100%; max-width: 400px; }
  .logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; gap: 4px; }
  .logo-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-sub { font-size: 10px; color: #00e676; font-weight: 700; letter-spacing: 2.5px; }
  h1 { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #7a8099; text-align: center; margin-bottom: 28px; }
  label { display: block; font-size: 11px; color: #7a8099; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  input { width: 100%; background: #0e1015; border: 1px solid #1e2230; border-radius: 8px; padding: 12px 14px; color: #e8eaf0; font-size: 14px; outline: none; margin-bottom: 18px; transition: border-color .2s; }
  input:focus { border-color: #00e676; }
  button[type=submit] { width: 100%; background: #00e676; color: #000; border: none; border-radius: 8px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
  button[type=submit]:hover { background: #00b359; }
  button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); border-radius: 8px; padding: 11px 14px; color: #ef4444; font-size: 13px; margin-bottom: 16px; display: none; }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-name">KryptoKnight</div>
    <div class="logo-sub">ADMIN PANEL</div>
  </div>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to access the admin dashboard</p>
  <div class="error" id="err"></div>
  <form id="form">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="admin@krypto-knight.com" autocomplete="email" required/>
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
    <button type="submit" id="btn">Sign In</button>
  </form>
</div>
<script>
if (localStorage.getItem('kk_token')) window.location.replace('/admin.html');

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }),
    });
    const data = await res.json();
    if (data.success && data.data.user.isAdmin) {
      localStorage.setItem('kk_token', data.data.token);
      window.location.replace('/admin.html');
    } else if (data.success) {
      err.textContent = 'This account does not have admin access.';
      err.classList.add('show');
    } else {
      err.textContent = data.error || 'Invalid credentials';
      err.classList.add('show');
    }
  } catch {
    err.textContent = 'Network error — please try again.';
    err.classList.add('show');
  }
  btn.disabled = false;
  btn.textContent = 'Sign In';
});
</script>
</body>
</html>
