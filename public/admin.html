<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KryptoKnight — Admin</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --adm-bg: #0a0b0e; --adm-sidebar: #0e1015; --adm-card: #13161d; --adm-card2: #181c25;
    --adm-border: #1e2230; --adm-border2: #252a38; --adm-text: #e8eaf0; --adm-muted: #7a8099;
    --adm-scroll-track: #111318; --adm-scroll-thumb: #2a2d36;
  }
  :root.light {
    --adm-bg: #f5f7fa; --adm-sidebar: #ffffff; --adm-card: #ffffff; --adm-card2: #f8fafc;
    --adm-border: #e2e8f0; --adm-border2: #cbd5e1; --adm-text: #1a202c; --adm-muted: #718096;
    --adm-scroll-track: #e8edf3; --adm-scroll-thumb: #c0ccda;
  }
  body { background: var(--adm-bg); color: var(--adm-text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--adm-scroll-track); }
  ::-webkit-scrollbar-thumb { background: var(--adm-scroll-thumb); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #00e676; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Mobile detection ──────────────────────────────────────────
const useIsMobile = () => {
  const [mobile, setMobile] = useState(() => window.innerWidth < 768);
  useEffect(() => {
    const fn = () => setMobile(window.innerWidth < 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return mobile;
};

// ── Auth ──────────────────────────────────────────────────────
const token = localStorage.getItem('kk_token');
if (!token) window.location.replace('/login.html');

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) },
  });
  if (res.status === 401) { localStorage.removeItem('kk_token'); window.location.replace('/login.html'); }
  return res.json();
}

function logout() { localStorage.removeItem('kk_token'); window.location.replace('/login.html'); }

// ── Helpers ───────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return 'never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function displayName(u) {
  if (!u) return '';
  const n = [u.firstName, u.lastName].filter(Boolean).join(' ');
  return n || u.username || u.email || '';
}

// ── Colors ────────────────────────────────────────────────────
const C = {
  bg:'var(--adm-bg)', sidebar:'var(--adm-sidebar)', card:'var(--adm-card)', card2:'var(--adm-card2)',
  border:'var(--adm-border)', border2:'var(--adm-border2)',
  orange:'#00e676', orangeD:'#00b359', orangeBg:'rgba(0,230,118,0.10)',
  text:'var(--adm-text)', muted:'var(--adm-muted)',
  green:'#22c55e', greenBg:'rgba(34,197,94,0.12)',
  red:'#ef4444', redBg:'rgba(239,68,68,0.12)',
  yellow:'#eab308', yellowBg:'rgba(234,179,8,0.12)',
  blue:'#3b82f6', blueBg:'rgba(59,130,246,0.12)',
  purple:'#a855f7', purpleBg:'rgba(168,85,247,0.12)',
};

    stroke={stroke?color:'none'} strokeWidth={stroke?2:0} strokeLinecap="round" strokeLinejoin="round">
    {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
  </svg>
);

  settings:'M12 15a3 3 0 100-6 3 3 0 000 6 M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z',
  bell:'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9 M13.73 21a2 2 0 01-3.46 0',
  search:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0',
  plus:'M12 5v14M5 12h14',

  eye:'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8 M12 9a3 3 0 100 6 3 3 0 000-6',
  ban:'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636',
  edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7 M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z',
  trash:'M3 6h18 M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2',

  check:'M20 6L9 17l-5-5',

  alert:'M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0 M12 9v4 M12 17h.01',
  key:'M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4',

  lock:'M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2 M17 11V7a5 5 0 00-10 0v4',
  activity:'M22 12h-4l-3 9L9 3l-3 9H2',
  fireblocks:'M12 2L2 7l10 5 10-5-10-5 M2 17l10 5 10-5 M2 12l10 5 10-5',
  send:'M22 2L11 13 M22 2l-7 20-4-9-9-4 20-7',
  arrowDown:'M12 5v14 M5 12l7 7 7-7',
  network:'M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v4m0 0H5m4 0h10M9 7v10m0 0H5a2 2 0 01-2-2v-4m6 6h10a2 2 0 002-2v-4m0 0h-6',
  sun:'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l.707.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z',
  moon:'M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z',
  file:'M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6',
};

// ── Shared UI ─────────────────────────────────────────────────
const Badge = ({ color='orange', children, small }) => {
  const m = { orange:{bg:C.orangeBg,text:C.orange}, green:{bg:C.greenBg,text:C.green}, red:{bg:C.redBg,text:C.red}, yellow:{bg:C.yellowBg,text:C.yellow}, blue:{bg:C.blueBg,text:C.blue}, purple:{bg:C.purpleBg,text:C.purple}, gray:{bg:'#1e2230',text:C.muted} };
  const c = m[color] || m.gray;
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:small?'2px 7px':'3px 10px', borderRadius:6, fontSize:small?10:11, fontWeight:600, background:c.bg, color:c.text, whiteSpace:'nowrap' }}>{children}</span>;
};

const Btn = ({ children, variant='primary', size='sm', onClick, icon, disabled, style={} }) => {
  const [h, sH] = useState(false);
  const base = { display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer', border:'none', borderRadius:8, fontWeight:600, transition:'all .15s', fontSize:size==='sm'?12:14, padding:size==='sm'?'7px 14px':'10px 20px', opacity:disabled?.5:1, ...style };
  const v = { primary:{background:h?C.orangeD:C.orange,color:'#fff'}, ghost:{background:h?C.border2:'transparent',color:C.text,border:`1px solid ${C.border}`}, danger:{background:h?'#b91c1c':C.redBg,color:C.red,border:`1px solid rgba(239,68,68,.2)`} };
  return <button style={{...base,...v[variant]}} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} onClick={onClick} disabled={disabled}>{icon&&<Icon d={Icons[icon]} size={13} color='currentColor' stroke/>}{children}</button>;
};

const StatCard = ({ label, value, sub, icon, color='orange', delta }) => {
  const cm = { orange:C.orange, green:C.green, blue:C.blue, purple:C.purple, red:C.red, yellow:C.yellow };
  const bm = { orange:C.orangeBg, green:C.greenBg, blue:C.blueBg, purple:C.purpleBg, red:C.redBg, yellow:C.yellowBg };
  const c = cm[color], bg = bm[color];
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'20px 22px', flex:1, minWidth:0 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
        <span style={{ color:C.muted, fontSize:12, fontWeight:500 }}>{label}</span>
        <div style={{ background:bg, borderRadius:8, padding:8 }}><Icon d={Icons[icon]} size={15} color={c} stroke/></div>
      </div>
      <div style={{ fontSize:28, fontWeight:700, color:C.text, letterSpacing:'-0.5px' }}>{value ?? '—'}</div>
      {sub && <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>{delta!==undefined&&<span style={{ color:delta>=0?C.green:C.red, marginRight:5 }}>{delta>=0?'▲':'▼'} {Math.abs(delta)}%</span>}{sub}</div>}
    </div>
  );
};

const Loading = () => (
  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:C.muted, fontSize:14 }}>Loading…</div>
);

// ── Page: Dashboard ───────────────────────────────────────────
const PageDashboard = ({ stats, audit }) => (
  <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
    <div style={{ marginBottom:28 }}>
      <div style={{ fontSize:22, fontWeight:700 }}>Platform Overview</div>
      <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>{new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} — Live</div>
    </div>
    <div style={{ display:'flex', gap:16, marginBottom:20 }}>
      <StatCard label="Total Users"       value={stats.totalUsers}       icon="users"    color="blue"   sub="registered"/>
      <StatCard label="Active Sessions"   value={stats.activeSessions}   icon="activity" color="green"  sub="right now"/>
      <StatCard label="API Keys Issued"   value={stats.activeApiKeys}    icon="key"      color="orange" sub="active keys"/>
      <StatCard label="Flagged Accounts"  value={stats.flaggedAccounts}  icon="alert"    color="red"    sub="need review"/>
    </div>
    <div style={{ display:'flex', gap:16, marginBottom:24 }}>
      <StatCard label="Connected Wallets" value={stats.connectedWallets} icon="wallet"   color="purple" sub="total"/>
      <StatCard label="2FA Adoption"      value={stats.twoFaAdoption!=null?stats.twoFaAdoption+'%':null} icon="lock" color="yellow" sub="of all users"/>
      <StatCard label="Avg Security Score"value={stats.avgSecurityScore!=null?stats.avgSecurityScore+'/100':null} icon="security" color="blue" sub="platform wide"/>
      <StatCard label="Banned Accounts"   value={stats.bannedAccounts}   icon="ban"      color="red"    sub="this month"/>
    </div>
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'20px 22px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
        <div style={{ fontWeight:600, fontSize:14 }}>Recent Audit Events</div>
        <Badge color="gray">Live</Badge>
      </div>
      {audit.slice(0,8).map((e,i) => {
        const sv = { info:'blue', warning:'yellow', danger:'red', success:'green' };
        const c = sv[e.severity] || 'gray';
        return (
          <div key={e.id} style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'10px 0', borderTop:i>0?`1px solid ${C.border}`:'none' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:C[c]||C.muted, marginTop:5, flexShrink:0 }}/>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:600 }}>{e.action}</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{e.userName} · {e.detail}</div>
            </div>
            <div style={{ fontSize:10, color:C.muted, whiteSpace:'nowrap' }}>{timeAgo(e.createdAt)}</div>
          </div>
        );
      })}
      {audit.length === 0 && <div style={{ color:C.muted, fontSize:13 }}>No audit events yet.</div>}
    </div>
  </div>
);

// ── Page: Users ───────────────────────────────────────────────
const PageUsers = ({ users, sessions, reload }) => {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(null);
  const [acting, setActing] = useState(null);
  const [activePanel, setActivePanel] = useState(null);
  const [showCreate, setShowCreate] = useState(false);

  // Edit state
  const [editForm, setEditForm] = useState({});
  const [editSaving, setEditSaving] = useState(false);
  const [editMsg, setEditMsg] = useState('');

  // Reset password state
  const [newPwd, setNewPwd] = useState('');
  const [resetMsg, setResetMsg] = useState('');
  const [resetSaving, setResetSaving] = useState(false);

  // Notify state
  const [notifyForm, setNotifyForm] = useState({ title:'', body:'', type:'info' });
  const [notifyMsg, setNotifyMsg] = useState('');
  const [notifySaving, setNotifySaving] = useState(false);

  // Create user state
  const [createForm, setCreateForm] = useState({ email:'', username:'', password:'', firstName:'', lastName:'', level:'0', status:'active' });
  const [createMsg, setCreateMsg] = useState('');
  const [createSaving, setCreateSaving] = useState(false);

  // Application / KYC data state
  const [application, setApplication] = useState(null);
  const [appLoading, setAppLoading] = useState(false);

  const filtered = users.filter(u => {
    const q = search.toLowerCase();
    const match = displayName(u).toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || u.username.toLowerCase().includes(q);
    return filter === 'all' ? match : match && u.status === filter;
  });

  const selectUser = (u) => {
    setSelected(u); setActivePanel(null); setApplication(null);
    setEditForm({ firstName:u.firstName||'', lastName:u.lastName||'', email:u.email, username:u.username, level:String(u.level), status:u.status });
    setEditMsg(''); setResetMsg(''); setNewPwd('');
    setNotifyForm({ title:'', body:'', type:'info' }); setNotifyMsg('');
  };
  const togglePanel = (p) => {
    setActivePanel(a => {
      const next = a===p ? null : p;
      if (next === 'kyc' && selected) {
        setAppLoading(true);
        api(`/admin/applications/${selected.id}`).then(r => {
          setApplication(r.data || null);
          setAppLoading(false);
        }).catch(() => setAppLoading(false));
      }
      return next;
    });
  };

  const banUser = async (u) => {
    setActing(u.id);
    await api(`/admin/users/${u.id}/ban`, { method:'POST', body:JSON.stringify({}) });
    await reload(); setActing(null);
    if (selected?.id === u.id) setSelected(null);
  };
  const unbanUser = async (u) => {
    setActing(u.id);
    await api(`/admin/users/${u.id}/unban`, { method:'POST', body:JSON.stringify({}) });
    await reload(); setActing(null);
  };
  const saveEdit = async (u) => {
    setEditSaving(true); setEditMsg('');
    const r = await api(`/admin/users/${u.id}`, { method:'PATCH', body:JSON.stringify({...editForm, level:parseInt(editForm.level)||0}) });
    if (r.success) { setEditMsg('✓ Saved'); await reload(); } else { setEditMsg(r.error||'Failed'); }
    setEditSaving(false);
  };
  const resetPwd = async (u) => {
    if (!newPwd || newPwd.length<6) { setResetMsg('Minimum 6 characters'); return; }
    setResetSaving(true); setResetMsg('');
    const r = await api(`/admin/users/${u.id}/reset-password`, { method:'POST', body:JSON.stringify({ password:newPwd }) });
    if (r.success) { setResetMsg('✓ Password updated'); setNewPwd(''); } else { setResetMsg(r.error||'Failed'); }
    setResetSaving(false);
  };
  const updateKyc = async (u, kycStatus) => {
    setActing(`kyc-${u.id}`);
    await api(`/admin/users/${u.id}/kyc`, { method:'PATCH', body:JSON.stringify({ kycStatus }) });
    await reload(); setActing(null);
  };
  const sendNotify = async (u) => {
    if (!notifyForm.title||!notifyForm.body) { setNotifyMsg('Title and message required'); return; }
    setNotifySaving(true); setNotifyMsg('');
    const r = await api(`/admin/users/${u.id}/notify`, { method:'POST', body:JSON.stringify(notifyForm) });
    if (r.success) { setNotifyMsg('✓ Notification sent'); setNotifyForm({ title:'', body:'', type:'info' }); } else { setNotifyMsg(r.error||'Failed'); }
    setNotifySaving(false);
  };
  const promoteAdmin = async (u) => {
    setActing(`adm-${u.id}`);
    await api(`/admin/users/${u.id}`, { method:'PATCH', body:JSON.stringify({ isAdmin:!u.isAdmin }) });
    await reload(); setActing(null);
  };
  const revokeSession = async (id) => {
    setActing(`sess-${id}`);
    await api(`/admin/sessions/${id}`, { method:'DELETE' });
    await reload(); setActing(null);
  };
  const exportCSV = () => {
    const headers = ['ID','Email','Username','First Name','Last Name','Status','Level','KYC','Admin','2FA','Score','Joined'];
    const rows = users.map(u=>[u.id,u.email,u.username,u.firstName||'',u.lastName||'',u.status,u.level,u.kycStatus||'none',u.isAdmin?'Yes':'No',u.twoFaEnabled?'Yes':'No',u.securityScore,fmtDate(u.createdAt)]);
    const csv = [headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`users-${new Date().toISOString().slice(0,10)}.csv`; a.click();
  };
  const createUser = async () => {
    if (!createForm.email||!createForm.username||!createForm.password) { setCreateMsg('Email, username and password required'); return; }
    setCreateSaving(true); setCreateMsg('');
    const r = await api('/admin/users', { method:'POST', body:JSON.stringify({...createForm, level:parseInt(createForm.level)||0}) });
    if (r.success) { setShowCreate(false); setCreateForm({ email:'', username:'', password:'', firstName:'', lastName:'', level:'0', status:'active' }); setCreateMsg(''); await reload(); }
    else { setCreateMsg(r.error||'Failed'); }
    setCreateSaving(false);
  };

  // ── Panel shared styles ──
  const panelStyle = (accent) => ({ background:C.card, border:`1px solid ${accent}40`, borderRadius:12, padding:22, marginBottom:16 });
  const panelTitle = (icon, label, color) => (
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16, fontSize:14, fontWeight:700, color }}>
      <Icon d={Icons[icon]} size={14} color={color} stroke/> {label}
    </div>
  );
  const inputStyle = { width:'100%', background:C.card2, border:`1px solid ${C.border}`, borderRadius:8, padding:'9px 12px', color:C.text, fontSize:13, outline:'none' };
  const labelStyle = { fontSize:11, color:C.muted, display:'block', marginBottom:4 };

  // ── User Detail ──
  if (selected) {
    const u = users.find(x=>x.id===selected.id) || selected;
    const userSessions = (sessions||[]).filter(s=>s.userId===u.id);
    const kycColor = {approved:'green',rejected:'red',pending:'yellow',none:'gray'}[u.kycStatus||'none']||'gray';

    return (
      <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
        <button onClick={()=>setSelected(null)} style={{ display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:13,marginBottom:20,padding:0 }}>← Back to Users</button>

        {/* Header card */}
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:24, marginBottom:16 }}>
          <div style={{ display:'flex', alignItems:'flex-start', gap:20, flexWrap:'wrap' }}>
            <div style={{ width:64, height:64, borderRadius:'50%', background:`hsl(${u.id.charCodeAt(0)*7},40%,22%)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:24, fontWeight:700, border:`3px solid ${C.border2}`, flexShrink:0 }}>
              {(displayName(u)||'?')[0].toUpperCase()}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
                <div style={{ fontSize:20, fontWeight:700 }}>{displayName(u)}</div>
                {u.isAdmin && <Badge color="purple">Admin</Badge>}
              </div>
              <div style={{ fontSize:13, color:C.muted, marginTop:3 }}>@{u.username} · {u.email}</div>
              <div style={{ display:'flex', gap:6, marginTop:8, flexWrap:'wrap' }}>
                <Badge color={u.status==='active'?'green':u.status==='banned'?'red':'yellow'}>{u.status}</Badge>
                <Badge color="gray">Lvl {u.level}</Badge>
                {u.twoFaEnabled&&<Badge color="green">2FA</Badge>}
                <Badge color={u.securityScore>=60?'green':u.securityScore>=40?'yellow':'red'}>Score {u.securityScore}</Badge>
                <Badge color={kycColor}>KYC: {u.kycStatus||'none'}</Badge>
              </div>
            </div>
          </div>
          {/* Action buttons */}
          <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginTop:18, paddingTop:16, borderTop:`1px solid ${C.border}` }}>
            <Btn variant={activePanel==='edit'?'primary':'ghost'} icon="edit" onClick={()=>togglePanel('edit')} size="sm">Edit</Btn>
            <Btn variant={activePanel==='reset'?'primary':'ghost'} icon="lock" onClick={()=>togglePanel('reset')} size="sm">Reset Password</Btn>
            <Btn variant={activePanel==='kyc'?'primary':'ghost'} icon="check" onClick={()=>togglePanel('kyc')} size="sm">KYC Review</Btn>
            <Btn variant={activePanel==='notify'?'primary':'ghost'} icon="send" onClick={()=>togglePanel('notify')} size="sm">Notify</Btn>
            <Btn variant={activePanel==='sessions'?'primary':'ghost'} icon="activity" onClick={()=>togglePanel('sessions')} size="sm">Sessions ({userSessions.length})</Btn>
            <Btn variant={u.isAdmin?'danger':'ghost'} icon="security" onClick={()=>promoteAdmin(u)} disabled={acting===`adm-${u.id}`} size="sm">
              {u.isAdmin?'Revoke Admin':'Make Admin'}
            </Btn>
            {u.status!=='banned'
              ?<Btn variant="danger" icon="ban" onClick={()=>banUser(u)} disabled={acting===u.id} size="sm">Ban</Btn>
              :<Btn variant="ghost" icon="check" onClick={()=>unbanUser(u)} disabled={acting===u.id} size="sm">Unban</Btn>
            }
          </div>
        </div>

        {/* ── Edit Panel ── */}
        {activePanel==='edit' && (
          <div style={panelStyle(C.orange)}>
            {panelTitle('edit','Edit User',C.orange)}
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
              {[['First Name','firstName'],['Last Name','lastName'],['Email','email'],['Username','username']].map(([label,key])=>(
                <div key={key}>
                  <label style={labelStyle}>{label}</label>
                  <input value={editForm[key]||''} onChange={e=>setEditForm(f=>({...f,[key]:e.target.value}))} style={inputStyle}/>
                </div>
              ))}
              <div>
                <label style={labelStyle}>Level (0–5)</label>
                <input type="number" min="0" max="5" value={editForm.level||'0'} onChange={e=>setEditForm(f=>({...f,level:e.target.value}))} style={inputStyle}/>
              </div>
              <div>
                <label style={labelStyle}>Status</label>
                <select value={editForm.status||'active'} onChange={e=>setEditForm(f=>({...f,status:e.target.value}))} style={inputStyle}>
                  {['active','pending','suspended','banned'].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:14 }}>
              <Btn onClick={()=>saveEdit(u)} disabled={editSaving}>{editSaving?'Saving…':'Save Changes'}</Btn>
              {editMsg&&<span style={{ fontSize:12, color:editMsg.startsWith('✓')?C.green:C.red }}>{editMsg}</span>}
            </div>
          </div>
        )}

        {/* ── Reset Password Panel ── */}
        {activePanel==='reset' && (
          <div style={panelStyle(C.blue)}>
            {panelTitle('lock','Reset Password',C.blue)}
            <div style={{ display:'flex', gap:10, alignItems:'flex-end', flexWrap:'wrap' }}>
              <div style={{ flex:1, minWidth:200 }}>
                <label style={labelStyle}>New Password (min 6 chars)</label>
                <input type="password" value={newPwd} onChange={e=>setNewPwd(e.target.value)} placeholder="Enter new password" style={inputStyle}/>
              </div>
              <Btn onClick={()=>resetPwd(u)} disabled={resetSaving}>{resetSaving?'Updating…':'Set Password'}</Btn>
            </div>
            {resetMsg&&<div style={{ fontSize:12, color:resetMsg.startsWith('✓')?C.green:C.red, marginTop:8 }}>{resetMsg}</div>}
          </div>
        )}

        {/* ── KYC Panel ── */}
        {activePanel==='kyc' && (
          <div style={panelStyle(C.yellow)}>
            {panelTitle('audit','KYC Review',C.yellow)}

            {/* Status row + action buttons */}
            <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>Current Status</div>
                <Badge color={kycColor}>{u.kycStatus||'none'}</Badge>
              </div>
              {u.kycReviewedAt&&(
                <div>
                  <div style={{ fontSize:11, color:C.muted, marginBottom:4 }}>Last Reviewed</div>
                  <span style={{ fontSize:12 }}>{fmtDate(u.kycReviewedAt)}</span>
                </div>
              )}
            </div>
            <div style={{ display:'flex', gap:8, marginBottom:20 }}>
              <Btn onClick={()=>updateKyc(u,'approved')} disabled={acting===`kyc-${u.id}`||u.kycStatus==='approved'}>Approve</Btn>
              <Btn variant="danger" onClick={()=>updateKyc(u,'rejected')} disabled={acting===`kyc-${u.id}`||u.kycStatus==='rejected'}>Reject</Btn>
              <Btn variant="ghost" onClick={()=>updateKyc(u,'pending')} disabled={acting===`kyc-${u.id}`||u.kycStatus==='pending'}>Set Pending</Btn>
              <Btn variant="ghost" onClick={()=>updateKyc(u,'none')} disabled={acting===`kyc-${u.id}`||u.kycStatus==='none'}>Reset</Btn>
            </div>

            {/* Application data */}
            {appLoading && (
              <div style={{ color:C.muted, fontSize:13, padding:'12px 0' }}>Loading application data…</div>
            )}

            {!appLoading && !application && (
              <div style={{ background:C.bg, border:`1px dashed ${C.border}`, borderRadius:8, padding:'14px 16px', fontSize:13, color:C.muted }}>
                No application form submitted yet for this user.
              </div>
            )}

            {!appLoading && application && (() => {
              const apps = Array.isArray(application) ? application : [application];
              return apps.map((app, ai) => {
                const d = app.data || {};
                const docs = app.documents || [];
                const isPersonal = app.type === 'personal';
                const sectionStyle = { marginBottom:20 };
                const sectionHeader = (label) => (
                  React.createElement('div', { style:{ fontSize:11, fontWeight:700, color:C.yellow, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8, paddingBottom:4, borderBottom:`1px solid ${C.yellow}30` } }, label)
                );
                const fieldRow = (label, value) => value ? (
                  React.createElement('div', { key:label, style:{ display:'grid', gridTemplateColumns:'160px 1fr', gap:8, padding:'5px 0', borderBottom:`1px solid ${C.border}` } },
                    React.createElement('span', { style:{ fontSize:12, color:C.muted } }, label),
                    React.createElement('span', { style:{ fontSize:12, color:C.text, wordBreak:'break-word' } }, value)
                  )
                ) : null;

                return React.createElement('div', { key:ai, style:{ background:C.bg, border:`1px solid ${C.border}`, borderRadius:10, padding:18, marginBottom: ai < apps.length-1 ? 16 : 0 } },
                  /* Header */
                  React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:16 } },
                    React.createElement('span', { style:{ background: isPersonal ? '#00e67622':'#7c3aed22', color: isPersonal ? C.green:'#a78bfa', fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:20, textTransform:'uppercase', letterSpacing:'0.05em' } }, isPersonal ? '👤 Personal' : '🏢 Business'),
                    React.createElement('span', { style:{ fontSize:11, color:C.muted } }, 'Submitted: ' + fmtDate(app.submittedAt))
                  ),

                  isPersonal ? React.createElement(React.Fragment, null,
                    /* Personal Info */
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Personal Information'),
                      fieldRow('Full Name', [d.firstName, d.middleName, d.lastName].filter(Boolean).join(' ')),
                      fieldRow('Date of Birth', d.dateOfBirth),
                      fieldRow('Place of Birth', d.placeOfBirth),
                    ),
                    /* Tax */
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Tax Information'),
                      fieldRow('Has Tax ID?', d.hasTaxId),
                      fieldRow('TIN', d.taxId),
                      fieldRow('No TIN Reason', d.noTaxIdReason),
                      fieldRow('Tax Country', d.taxCountry),
                    ),
                    /* Citizenship */
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Citizenship & Identity'),
                      fieldRow('Nationality', d.nationality),
                      fieldRow('Citizenship', d.citizenship),
                      fieldRow('Passport / ID No', d.passportNo),
                      fieldRow('Issuing Authority', d.issuingAuthority),
                      fieldRow('Date of Issue', d.dateOfIssue),
                      fieldRow('Date of Expiry', d.dateOfExpiry),
                      fieldRow('Dual Citizenship', d.hasDualCitizenship),
                      fieldRow('Second Nationality', d.secondNationality),
                    ),
                    /* Address */
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Residential Address'),
                      fieldRow('Street', d.street),
                      fieldRow('City', d.city),
                      fieldRow('State / Region', d.state),
                      fieldRow('Postal Code', d.zip),
                      fieldRow('Country', d.country),
                      d.differentMailing==='Yes' && fieldRow('Mailing Street', d.mailingStreet),
                      d.differentMailing==='Yes' && fieldRow('Mailing City', d.mailingCity),
                      d.differentMailing==='Yes' && fieldRow('Mailing Country', d.mailingCountry),
                    ),
                    /* Contact */
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Contact'),
                      fieldRow('Email', d.email),
                      fieldRow('Phone', d.phone),
                      fieldRow('Facebook', d.facebook),
                      fieldRow('LinkedIn', d.linkedin),
                      fieldRow('Other', d.other),
                    )
                  ) : React.createElement(React.Fragment, null,
                    /* Business Info */
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Company Information'),
                      fieldRow('Legal Name', d.legalName),
                      fieldRow('Trading Name', d.tradingName),
                      fieldRow('Country of Incorporation', d.countryOfIncorporation),
                      fieldRow('Incorporation Date', d.incorporationDate),
                      fieldRow('Registration Number', d.registrationNumber),
                    ),
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Tax Information'),
                      fieldRow('Has Tax ID?', d.hasTaxId),
                      fieldRow('TIN', d.taxId),
                      fieldRow('No TIN Reason', d.noTaxIdReason),
                    ),
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Business Profile'),
                      fieldRow('Business Activities', d.businessActivities),
                      fieldRow('Years of Operation', d.yearsOfOperation),
                      fieldRow('Employees', d.numberOfEmployees),
                      fieldRow('Annual Income', d.annualIncome),
                      fieldRow('Part of Group?', d.partOfGroup),
                      fieldRow('Group Details', d.groupDetails),
                      fieldRow('Regulated?', d.isRegulated),
                      fieldRow('License Number', d.licenseNumber),
                      fieldRow('Regulator', d.issuingRegulator),
                    ),
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Registered Address'),
                      fieldRow('Street', d.regStreet),
                      fieldRow('City', d.regCity),
                      fieldRow('Country', d.regCountry),
                    ),
                    React.createElement('div', { style:sectionStyle },
                      sectionHeader('Contact'),
                      fieldRow('Email', d.email),
                      fieldRow('Phone', d.phone),
                      fieldRow('Website', d.website),
                    )
                  ),

                  /* Documents */
                  docs.length > 0 && React.createElement('div', { style:sectionStyle },
                    sectionHeader('Uploaded Documents'),
                    React.createElement('div', { style:{ display:'flex', gap:8, flexWrap:'wrap', marginTop:6 } },
                      docs.map((doc, di) =>
                        React.createElement('a', {
                          key:di,
                          href: `/admin/applications/${u.id}/document/${di}`,
                          target:'_blank',
                          rel:'noopener noreferrer',
                          style:{ display:'inline-flex', alignItems:'center', gap:6, background:C.card, border:`1px solid ${C.border}`, borderRadius:7, padding:'7px 14px', fontSize:12, color:C.text, textDecoration:'none', cursor:'pointer' },
                        },
                          React.createElement(Icon, { d:Icons.file, size:12, color:C.muted }),
                          doc.name,
                          React.createElement('span', { style:{ color:C.muted, fontSize:11 } }, `(${(doc.size/1024).toFixed(0)} KB)`)
                        )
                      )
                    )
                  )
                );
              });
            })()}
          </div>
        )}

        {/* ── Send Notification Panel ── */}
        {activePanel==='notify' && (
          <div style={panelStyle(C.purple)}>
            {panelTitle('bell','Send Notification',C.purple)}
            <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:10, marginBottom:10 }}>
              <div>
                <label style={labelStyle}>Title</label>
                <input value={notifyForm.title} onChange={e=>setNotifyForm(f=>({...f,title:e.target.value}))} placeholder="Notification title" style={inputStyle}/>
              </div>
              <div>
                <label style={labelStyle}>Type</label>
                <select value={notifyForm.type} onChange={e=>setNotifyForm(f=>({...f,type:e.target.value}))} style={{...inputStyle,width:120}}>
                  {['info','warning','danger','success'].map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginBottom:12 }}>
              <label style={labelStyle}>Message</label>
              <textarea value={notifyForm.body} onChange={e=>setNotifyForm(f=>({...f,body:e.target.value}))} placeholder="Notification message…" rows={3} style={{...inputStyle,resize:'vertical'}}/>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <Btn icon="send" onClick={()=>sendNotify(u)} disabled={notifySaving}>{notifySaving?'Sending…':'Send Notification'}</Btn>
              {notifyMsg&&<span style={{ fontSize:12, color:notifyMsg.startsWith('✓')?C.green:C.red }}>{notifyMsg}</span>}
            </div>
          </div>
        )}

        {/* ── Sessions Panel ── */}
        {activePanel==='sessions' && (
          <div style={panelStyle(C.green)}>
            {panelTitle('activity',`Sessions (${userSessions.length} active)`,C.green)}
            {userSessions.length===0&&<div style={{ color:C.muted, fontSize:13 }}>No active sessions for this user.</div>}
            {userSessions.map((s,i)=>(
              <div key={s.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderTop:i>0?`1px solid ${C.border}`:'none' }}>
                <div style={{ width:32,height:32,borderRadius:8,background:C.border2,display:'flex',alignItems:'center',justifyContent:'center' }}><Icon d={Icons.globe} size={14} color={C.muted} stroke/></div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12,fontWeight:600 }}>{s.device||'Unknown device'}</div>
                  <div style={{ fontSize:11,color:C.muted }}>{s.location||'Unknown'} · {s.ipAddress||'—'} · {timeAgo(s.lastActiveAt)}</div>
                </div>
                <button onClick={()=>revokeSession(s.id)} disabled={acting===`sess-${s.id}`} style={{ background:C.redBg,border:'none',borderRadius:6,padding:'5px 10px',color:C.red,cursor:'pointer',fontSize:11,fontWeight:600 }}>Revoke</button>
              </div>
            ))}
          </div>
        )}

        {/* ── Account Details ── */}
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:22 }}>
          <div style={{ fontWeight:600, marginBottom:16, fontSize:14 }}>Account Details</div>
          {[
            ['Email',u.email],['Username','@'+u.username],['Status',u.status],
            ['KYC Status',u.kycStatus||'none'],['Admin',u.isAdmin?'Yes':'No'],
            ['Joined',fmtDate(u.createdAt)],['Last Seen',timeAgo(u.lastSeenAt)],
            ['Country',u.country||'—'],['Phone',u.phone||'—'],
            ['Email Verified',u.emailVerified?'Yes':'No'],
            ['2FA',u.twoFaEnabled?'Enabled':'Disabled'],
            ['Security Score',u.securityScore+'/100'],
          ].map(([k,v])=>(
            <div key={k} style={{ display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`,fontSize:13 }}>
              <span style={{ color:C.muted }}>{k}</span><span>{String(v)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── User List ──
  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
      {/* Create User Modal */}
      {showCreate && (
        <div style={{ position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center' }}>
          <div style={{ background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,width:480,maxWidth:'95vw' }}>
            <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 }}>
              <div style={{ fontSize:16,fontWeight:700 }}>Create User</div>
              <button onClick={()=>{ setShowCreate(false); setCreateMsg(''); }} style={{ background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:18,lineHeight:1 }}>✕</button>
            </div>
            <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
              {[['Email','email','text'],['Username','username','text'],['First Name','firstName','text'],['Last Name','lastName','text']].map(([label,key,type])=>(
                <div key={key}>
                  <label style={{ fontSize:11,color:C.muted,display:'block',marginBottom:4 }}>{label}</label>
                  <input type={type} value={createForm[key]||''} onChange={e=>setCreateForm(f=>({...f,[key]:e.target.value}))} style={{ width:'100%',background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none' }}/>
                </div>
              ))}
              <div style={{ gridColumn:'1/-1' }}>
                <label style={{ fontSize:11,color:C.muted,display:'block',marginBottom:4 }}>Password (min 6)</label>
                <input type="password" value={createForm.password} onChange={e=>setCreateForm(f=>({...f,password:e.target.value}))} style={{ width:'100%',background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none' }}/>
              </div>
              <div>
                <label style={{ fontSize:11,color:C.muted,display:'block',marginBottom:4 }}>Level</label>
                <input type="number" min="0" max="5" value={createForm.level} onChange={e=>setCreateForm(f=>({...f,level:e.target.value}))} style={{ width:'100%',background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none' }}/>
              </div>
              <div>
                <label style={{ fontSize:11,color:C.muted,display:'block',marginBottom:4 }}>Status</label>
                <select value={createForm.status} onChange={e=>setCreateForm(f=>({...f,status:e.target.value}))} style={{ width:'100%',background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none' }}>
                  {['active','pending','suspended'].map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display:'flex',alignItems:'center',gap:12,marginTop:18 }}>
              <Btn size="md" onClick={createUser} disabled={createSaving}>{createSaving?'Creating…':'Create User'}</Btn>
              <Btn size="md" variant="ghost" onClick={()=>{ setShowCreate(false); setCreateMsg(''); }}>Cancel</Btn>
              {createMsg&&<span style={{ fontSize:12,color:createMsg.startsWith('✓')?C.green:C.red }}>{createMsg}</span>}
            </div>
          </div>
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ fontSize:22, fontWeight:700 }}>User Management</div>
          <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>{users.length} total users</div>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant="ghost" icon="download" onClick={exportCSV} size="sm">Export CSV</Btn>
          <Btn icon="plus" onClick={()=>setShowCreate(true)} size="sm">Create User</Btn>
        </div>
      </div>
      <div style={{ display:'flex', gap:12, marginBottom:20, alignItems:'center' }}>
        <div style={{ position:'relative', flex:1, maxWidth:320 }}>
          <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)' }}><Icon d={Icons.search} size={14} color={C.muted} stroke/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search users…"
            style={{ width:'100%', background:C.card, border:`1px solid ${C.border}`, borderRadius:8, padding:'9px 12px 9px 36px', color:C.text, fontSize:13, outline:'none' }}/>
        </div>
        {['all','active','pending','banned'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{ padding:'8px 16px', borderRadius:8, border:`1px solid ${filter===f?C.orange:C.border}`, background:filter===f?C.orangeBg:'transparent', color:filter===f?C.orange:C.muted, fontSize:12, fontWeight:600, cursor:'pointer', textTransform:'capitalize' }}>{f}</button>
        ))}
      </div>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${C.border}` }}>
              {['User','Email','Status','KYC','Score','2FA','Joined','Actions'].map(h=>(
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:C.muted, fontWeight:600, fontSize:11 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((u,i)=>(
              <tr key={u.id} style={{ borderBottom:`1px solid ${C.border}` }}
                onMouseEnter={e=>e.currentTarget.style.background=C.card2}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ width:32, height:32, borderRadius:'50%', background:`hsl(${u.id.charCodeAt(0)*7},40%,22%)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700 }}>
                      {(displayName(u)||'?')[0].toUpperCase()}
                    </div>
                    <div>
                      <div style={{ fontWeight:600, display:'flex', alignItems:'center', gap:5 }}>

                    <button onClick={()=>selectUser(u)} style={{ background:C.blueBg, border:'none', borderRadius:6, padding:'5px 8px', color:C.blue, cursor:'pointer', fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:4 }}>
                      <Icon d={Icons.eye} size={12} color={C.blue} stroke/> View
                    </button>
                    {u.status!=='banned'
                      ?<button onClick={()=>banUser(u)} disabled={acting===u.id} style={{ background:C.redBg, border:'none', borderRadius:6, padding:'5px 10px', color:C.red, cursor:'pointer', fontSize:11, fontWeight:600 }}>Ban</button>
                      :<button onClick={()=>unbanUser(u)} disabled={acting===u.id} style={{ background:C.greenBg, border:'none', borderRadius:6, padding:'5px 10px', color:C.green, cursor:'pointer', fontSize:11, fontWeight:600 }}>Unban</button>
                    }
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0 && <div style={{ padding:24, textAlign:'center', color:C.muted, fontSize:13 }}>No users found.</div>}
      </div>
    </div>
  );
};

// ── Page: Security ────────────────────────────────────────────

    await api(`/admin/sessions/${id}`, { method:'DELETE' });
    await reload();
    setActing(null);

    setActing('all');
    await api('/admin/sessions', { method:'DELETE' });
    await reload();
    setActing(null);

    setActing(u.id);

      <div style={{ display:'flex', gap:16, marginBottom:24 }}>
        <StatCard label="At-Risk Accounts" value={String(flagged.length)} icon="alert"    color="red"   sub="low score"/>

      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:22, marginBottom:20 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
          <div><div style={{ fontWeight:600, fontSize:14 }}>Flagged Accounts</div><div style={{ fontSize:12, color:C.muted, marginTop:3 }}>Low security score or banned</div></div>

        {flagged.length===0 && <div style={{ color:C.muted, fontSize:13 }}>No flagged accounts.</div>}

              <div style={{ fontWeight:600, fontSize:13 }}>{displayName(u)}</div>
              <div style={{ fontSize:12, color:C.muted }}>{u.email}</div>

            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:18, fontWeight:700, color:u.securityScore<40?C.red:C.yellow }}>{u.securityScore}</div>
              <div style={{ fontSize:10, color:C.muted }}>Score</div>
            </div>
            <Badge color={u.status==='banned'?'red':u.securityScore<20?'red':'yellow'}>{u.status==='banned'?'Banned':'At Risk'}</Badge>

// ── Page: API Keys ────────────────────────────────────────────
const PageAPIKeys = ({ apiKeys, reload }) => {
  const [copied, setCopied] = useState(null);
  const [acting, setActing] = useState(null);

  const revoke = async (id) => { setActing(id); await api(`/admin/api-keys/${id}/revoke`, { method:'PATCH', body:'{}' }); await reload(); setActing(null); };
  const restore = async (id) => { setActing(id); await api(`/admin/api-keys/${id}/restore`, { method:'PATCH', body:'{}' }); await reload(); setActing(null); };
  const del = async (id) => { setActing(id); await api(`/admin/api-keys/${id}`, { method:'DELETE' }); await reload(); setActing(null); };
  const copy = (text) => { navigator.clipboard?.writeText(text); setCopied(text); setTimeout(()=>setCopied(null),1500); };

  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div><div style={{ fontSize:22, fontWeight:700 }}>API Key Management</div><div style={{ fontSize:13, color:C.muted, marginTop:4 }}>{apiKeys.length} keys across all users</div></div>
      </div>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${C.border}` }}>
              {['Key ID','Name','User','Permissions','Created','Last Used','Status','Actions'].map(h=>(
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:C.muted, fontSize:11, fontWeight:600, whiteSpace:'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {apiKeys.map(k=>(
              <tr key={k.id} style={{ borderBottom:`1px solid ${C.border}` }}
                onMouseEnter={e=>e.currentTarget.style.background=C.card2}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <code style={{ fontSize:11, color:C.orange, background:C.orangeBg, padding:'3px 7px', borderRadius:5 }}>{k.keyId?.slice(0,18)}…</code>
                    <button onClick={()=>copy(k.keyId)} style={{ background:'none', border:'none', cursor:'pointer', color:copied===k.keyId?C.green:C.muted, padding:0 }}>
                      <Icon d={copied===k.keyId?Icons.check:Icons.copy} size={13} stroke/>
                    </button>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', fontWeight:600 }}>{k.name}</td>
                <td style={{ padding:'13px 16px', color:C.muted }}>{k.userEmail||k.userName}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:4, flexWrap:'wrap' }}>
                    {(k.permissions||[]).map(p=><Badge key={p} color={p==='withdraw'?'red':p==='trade'?'orange':'gray'} small>{p}</Badge>)}
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:C.muted }}>{fmtDate(k.createdAt)}</td>
                <td style={{ padding:'13px 16px', color:C.muted }}>{k.lastUsedAt?timeAgo(k.lastUsedAt):'never'}</td>
                <td style={{ padding:'13px 16px' }}><Badge color={k.status==='active'?'green':'red'} small>{k.status}</Badge></td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    {k.status==='active'
                      ? <button onClick={()=>revoke(k.id)} disabled={acting===k.id} style={{ background:C.redBg, border:'none', borderRadius:6, padding:'5px 10px', color:C.red, cursor:'pointer', fontSize:11, fontWeight:600 }}>Revoke</button>
                      : <button onClick={()=>restore(k.id)} disabled={acting===k.id} style={{ background:C.greenBg, border:'none', borderRadius:6, padding:'5px 10px', color:C.green, cursor:'pointer', fontSize:11, fontWeight:600 }}>Restore</button>
                    }
                    <button onClick={()=>del(k.id)} disabled={acting===k.id} style={{ background:C.redBg, border:'none', borderRadius:6, padding:'5px 8px', color:C.red, cursor:'pointer', display:'flex', alignItems:'center' }}>
                      <Icon d={Icons.trash} size={12} stroke/>
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {apiKeys.length===0 && <div style={{ padding:24, textAlign:'center', color:C.muted, fontSize:13 }}>No API keys yet.</div>}
      </div>
    </div>
  );
};

// ── Page: Notifications ───────────────────────────────────────
const PageNotifications = ({ notifications, reload }) => {
  const markRead = async (id) => {
    await api(`/admin/notifications/${id}/read`, { method:'PATCH', body:'{}' });
    await reload();
  };
  const markAllRead = async () => {
    await api('/admin/notifications/read-all', { method:'PATCH', body:'{}' });
    await reload();
  };
  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div><div style={{ fontSize:22, fontWeight:700 }}>Notifications</div><div style={{ fontSize:13, color:C.muted, marginTop:4 }}>Platform-wide alerts</div></div>
        {notifications.some(n=>!n.isRead) && <Btn variant="ghost" onClick={markAllRead}>Mark all read</Btn>}
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
        {notifications.length===0 && <div style={{ color:C.muted, fontSize:13 }}>No notifications.</div>}
        {notifications.map(n=>{
          const cm = { danger:C.red, warning:C.yellow, success:C.green, info:C.blue };
          const bm = { danger:C.redBg, warning:C.yellowBg, success:C.greenBg, info:C.blueBg };
          const c = cm[n.type]||C.blue, bg = bm[n.type]||C.blueBg;
          return (
            <div key={n.id} style={{ background:n.isRead?C.card:C.card2, border:`1px solid ${n.isRead?C.border:c}`, borderRadius:12, padding:'16px 20px', display:'flex', gap:14, alignItems:'flex-start' }}>
              <div style={{ width:36, height:36, borderRadius:8, background:bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><Icon d={Icons.bell} size={15} color={c} stroke/></div>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                  <div style={{ fontWeight:600, fontSize:13 }}>{n.title}</div>
                  <div style={{ fontSize:11, color:C.muted }}>{timeAgo(n.createdAt)}</div>
                </div>
                <div style={{ fontSize:12, color:C.muted }}>{n.body}</div>

              {!n.isRead && <button onClick={()=>markRead(n.id)} style={{ background:'none', border:'none', color:C.muted, cursor:'pointer', fontSize:11, flexShrink:0 }}>✕</button>}
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── Page: Settings ────────────────────────────────────────────
const PageSettings = ({ settings, reload }) => {
  const [local, setLocal] = useState(settings);
  const [saved, setSaved] = useState(false);
  const [showPass, setShowPass] = useState(false);
  const [testTo, setTestTo] = useState('');
  const [testing, setTesting] = useState(false);
  const [testMsg, setTestMsg] = useState(null); // {ok, text}
  useEffect(()=>setLocal(settings),[settings]);

  const save = async () => {
    await api('/admin/settings', { method:'PATCH', body:JSON.stringify(local) });
    await reload();
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };
  const toggle = (key) => setLocal(p=>({ ...p, [key]: p[key]==='true'?'false':'true' }));
  const set = (key, val) => setLocal(p=>({ ...p, [key]: val }));

  const testSmtp = async () => {
    setTesting(true); setTestMsg(null);
    const body = {
      host: local.smtp_host, port: local.smtp_port, secure: local.smtp_secure,
      user: local.smtp_user, pass: local.smtp_pass, from: local.smtp_from,
      recipient: local.smtp_recipient, testTo: testTo||local.smtp_recipient,
    };
    const r = await api('/admin/smtp/test', { method:'POST', body:JSON.stringify(body) });
    setTestMsg(r.success ? { ok:true, text: r.message||'Test email sent!' } : { ok:false, text: r.error||'Test failed' });
    setTesting(false);
  };

  const sections = [
    { title:'General', icon:'settings', fields:[
      { label:'Platform Name', key:'platform_name', type:'text' },
      { label:'Support Email', key:'support_email', type:'text' },
      { label:'Maintenance Mode', key:'maintenance_mode', type:'toggle' },
      { label:'New Registrations', key:'new_registrations', type:'toggle' },
    ]},
    { title:'Security Defaults', icon:'security', fields:[
      { label:'Minimum Security Score', key:'min_security_score', type:'text' },
      { label:'Session Timeout (mins)', key:'session_timeout_mins', type:'text' },
      { label:'Force 2FA for Withdrawals', key:'force_2fa_withdrawals', type:'toggle' },
      { label:'Auto-ban Below Threshold', key:'auto_ban_below_threshold', type:'toggle' },
    ]},
    { title:'Notifications', icon:'bell', fields:[
      { label:'Admin Alert Email', key:'admin_alert_email', type:'text' },
      { label:'Security Alerts', key:'security_alerts', type:'toggle' },
      { label:'New User Alerts', key:'new_user_alerts', type:'toggle' },
      { label:'API Abuse Alerts', key:'api_abuse_alerts', type:'toggle' },
    ]},
  ];

  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>

        <div key={s.title} style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:24, marginBottom:18 }}>
