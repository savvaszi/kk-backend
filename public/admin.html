            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>Enable for port 465. Leave off for 25/587/2525 (STARTTLS)</div>
          </div>
          <div onClick={()=>toggle('smtp_secure')} style={{ width:44, height:24, borderRadius:12, background:local.smtp_secure==='true'?C.blue:C.border2, cursor:'pointer', position:'relative', transition:'background .2s' }}>
            <div style={{ position:'absolute', width:18, height:18, borderRadius:'50%', background:'#fff', top:3, left:local.smtp_secure==='true'?23:3, transition:'left .2s' }}/>
          </div>
        </div>

        {/* Credentials */}
        <div style={{ marginTop:8, paddingTop:8, borderTop:`1px solid ${C.border}40`, marginBottom:0 }}>
          <div style={{ fontSize:11, color:C.muted, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4, paddingTop:8 }}>Authentication</div>
        </div>
        <div style={rowStyle}>
          <label style={{ fontSize:13 }}>Username</label>
          <input value={local.smtp_user||''} onChange={e=>set('smtp_user',e.target.value)} placeholder="mb73770" style={inputStyle}/>
        </div>
        <div style={rowStyle}>
          <label style={{ fontSize:13 }}>Password</label>
          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            <input type={showPass?'text':'password'} value={local.smtp_pass||''} onChange={e=>set('smtp_pass',e.target.value)} style={inputStyle}/>
            <button onClick={()=>setShowPass(p=>!p)} style={{ padding:'8px 10px', borderRadius:8, border:`1px solid ${C.border}`, background:'transparent', color:C.muted, fontSize:11, cursor:'pointer', whiteSpace:'nowrap' }}>
              {showPass ? 'Hide' : 'Show'}
            </button>
          </div>
        </div>

        {/* From / Recipient */}
        <div style={{ marginTop:8, paddingTop:8, borderTop:`1px solid ${C.border}40` }}>
          <div style={{ fontSize:11, color:C.muted, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4, paddingTop:8 }}>Addresses</div>
        </div>
        <div style={rowStyle}>
          <div>
            <label style={{ fontSize:13 }}>From Address</label>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>Appears in the From field of all sent emails</div>
          </div>
          <input value={local.smtp_from||''} onChange={e=>set('smtp_from',e.target.value)} placeholder='"Krypto Knight" <support@krypto-knight.com>' style={{ ...inputStyle, width:320 }}/>
        </div>
        <div style={rowStyle}>
          <div>
            <label style={{ fontSize:13 }}>Admin Recipient</label>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>Where application / contact form notifications are delivered</div>
          </div>
          <input value={local.smtp_recipient||''} onChange={e=>set('smtp_recipient',e.target.value)} placeholder="info@krypto-knight.com" style={{ ...inputStyle, width:320 }}/>
        </div>

        {/* Test Connection */}
        <div style={{ marginTop:18, paddingTop:16, borderTop:`1px solid ${C.border}`, display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
          <div style={{ fontWeight:600, fontSize:13 }}>Test Connection</div>
          <input value={testTo} onChange={e=>setTestTo(e.target.value)} placeholder={local.smtp_recipient||'Send test to…'} style={{ ...inputStyle, width:240 }}/>
          <Btn variant="ghost" size="sm" onClick={testSmtp} disabled={testing}>
            {testing ? 'Sending…' : '⚡ Send Test Email'}
          </Btn>
          {testMsg && (
            <span style={{ fontSize:13, color: testMsg.ok ? C.green : C.red, display:'flex', alignItems:'center', gap:4 }}>
              {testMsg.ok ? '✓' : '✗'} {testMsg.text}
            </span>
          )}
        </div>
      </div>

      <div style={{ display:'flex', gap:12 }}>
        <Btn size="md" onClick={save}>{saved?'✓ Saved!':'Save All Settings'}</Btn>
        <Btn variant="ghost" size="md" onClick={()=>setLocal(settings)}>Reset</Btn>
      </div>
    </div>
  );
};

// ── Fireblocks Page ───────────────────────────────────────────
const FbTable = ({ headers, rows, empty }) => (
  rows.length===0 ? <div style={{ padding:24, color:C.muted, fontSize:13 }}>{empty||'No data.'}</div> : (
    <div style={{ overflowX:'auto' }}>
      <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
        <thead><tr style={{ borderBottom:`1px solid ${C.border}` }}>
          {headers.map(h=><th key={h} style={{ padding:'10px 16px', textAlign:'left', color:C.muted, fontWeight:600, fontSize:11, whiteSpace:'nowrap' }}>{h}</th>)}
        </tr></thead>
        <tbody>{rows}</tbody>
      </table>
    </div>
  )
);

const FbCard = ({ title, children, action }) => (
  <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden' }}>
    <div style={{ padding:'14px 20px', borderBottom:`1px solid ${C.border}`, fontWeight:600, fontSize:14, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
      <span>{title}</span>{action}
    </div>
    {children}
  </div>
);

const PageFireblocks = ({ users }) => {
  const [tab, setTab] = useState('vaults');
  const [data, setData] = useState({});
  const [fbStatus, setFbStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState('');
  const [createForm, setCreateForm] = useState({ userId:'', name:'' });
  const [creating, setCreating] = useState(false);

  const txStatusColor = s => ({ COMPLETED:'green', CONFIRMING:'blue', BROADCASTING:'blue', PENDING_SIGNATURE:'yellow', PENDING_AUTHORIZATION:'yellow', FAILED:'red', CANCELLED:'gray', BLOCKED:'orange' }[s] || 'gray');

  useEffect(() => {
    api('/admin/fireblocks/status').then(r => r.success && setFbStatus(r.data));
  }, []);

  useEffect(() => {
    if (!fbStatus?.configured) return;
    setLoading(true);
    const endpoints = {
      vaults:       '/admin/fireblocks/vaults',
      transactions: '/admin/fireblocks/transactions?limit=50',
      staking:      '/admin/fireblocks/staking/positions',
      policy:       '/admin/fireblocks/policy/active',
      compliance:   '/admin/fireblocks/compliance/policy',
      'gas-station':'/admin/fireblocks/gas-station',
      exchange:     '/admin/fireblocks/exchange',
      fiat:         '/admin/fireblocks/fiat',
      ncw:          '/admin/fireblocks/ncw',
      'audit-logs': '/admin/fireblocks/audit-logs',
      nfts:         '/admin/fireblocks/nfts',
      earn:         '/admin/fireblocks/earn/opportunities',
      contracts:    '/admin/fireblocks/contracts/deployed',
      workspace:    '/admin/fireblocks/workspace/users/console',
      cosigners:    '/admin/fireblocks/cosigners',
      'off-exchange':'/admin/fireblocks/off-exchange',
      network:      '/admin/fireblocks/network',
    };
    const url = endpoints[tab];
    if (!url) { setLoading(false); return; }
    api(url).then(r => {
      const val = r.data?.accounts || r.data?.rules || r.data?.entities || r.data || [];
      setData(d => ({ ...d, [tab]: val }));
    }).finally(() => setLoading(false));
  }, [tab, fbStatus]);

  const tabData = data[tab] || [];

  const createVault = async () => {
    if (!createForm.userId || !createForm.name) { setMsg('Select a user and enter a vault name.'); return; }
    setCreating(true); setMsg('');
    const r = await api('/admin/fireblocks/vaults', { method:'POST', body:JSON.stringify(createForm) });
    setMsg(r.success ? `✓ Vault created: ${r.data?.id}` : r.error || 'Failed');
    if (r.success) { setCreateForm({ userId:'', name:'' }); api('/admin/fireblocks/vaults').then(r2 => r2.success && setData(d=>({...d, vaults: r2.data?.accounts||r2.data||[]}))); }
    setCreating(false);
  };

  if (!fbStatus) return <div style={{ padding:32, color:C.muted }}>Loading Fireblocks status…</div>;

  if (!fbStatus.configured) return (
    <div style={{ padding:32 }}>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:32, maxWidth:560 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
          <Icon d={Icons.fireblocks} size={24} color={C.orange} stroke/>
          <div style={{ fontSize:18, fontWeight:700 }}>Fireblocks Not Configured</div>
        </div>
        <p style={{ color:C.muted, fontSize:13, lineHeight:1.6, marginBottom:20 }}>
          To enable Fireblocks custody integration, set the following environment variables in your Dokploy deployment:
        </p>
        <div style={{ background:'#0a0b0e', borderRadius:8, padding:16, fontFamily:'monospace', fontSize:12, color:'#a0a8c0', marginBottom:20 }}>
          FIREBLOCKS_API_KEY=your_api_key<br/>
          FIREBLOCKS_SECRET_KEY=your_rsa_private_key<br/>
          FIREBLOCKS_BASE_URL=https://sandbox-api.fireblocks.io
        </div>
        <p style={{ color:C.muted, fontSize:12 }}>
          Get your API credentials from the Fireblocks Console → Settings → API Keys.
          Use the sandbox URL for testing.
        </p>
      </div>
    </div>
  );

  const TABS = [
    { id:'vaults',       label:'Vaults' },
    { id:'transactions', label:'Transactions' },
    { id:'staking',      label:'Staking' },
    { id:'policy',       label:'Policy Engine' },
    { id:'compliance',   label:'AML/Compliance' },
    { id:'gas-station',  label:'Gas Station' },
    { id:'exchange',     label:'Exchange' },
    { id:'fiat',         label:'Fiat' },
    { id:'ncw',          label:'NCW Wallets' },
    { id:'audit-logs',   label:'Audit Logs' },
    { id:'nfts',         label:'NFTs' },
    { id:'earn',         label:'Earn/Yield' },
    { id:'contracts',    label:'Smart Contracts' },
    { id:'workspace',    label:'Workspace Users' },
    { id:'cosigners',    label:'Cosigners' },
    { id:'off-exchange', label:'Off-Exchange' },
    { id:'network',      label:'Network' },
  ];

  const td = (content, mono=false) => (
    <td style={{ padding:'10px 16px', fontFamily:mono?'monospace':'inherit', fontSize:mono?11:13, color:mono?C.muted:C.text }}>{content}</td>
  );

  return (
    <div style={{ padding:28, display:'flex', flexDirection:'column', gap:18 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700, display:'flex', alignItems:'center', gap:10 }}>
            <Icon d={Icons.fireblocks} size={20} color={C.orange} stroke/> Fireblocks Integration
          </div>
          <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Full MPC custody — vaults, policy, AML, staking, NCW, earn &amp; more</div>
        </div>
        <Badge color="green">Connected</Badge>
      </div>

      {/* Tab bar — scrollable */}
      <div style={{ overflowX:'auto', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', gap:2, minWidth:'max-content' }}>
          {TABS.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ padding:'8px 14px', background:'none', border:'none', borderBottom:tab===t.id?`2px solid ${C.orange}`:'2px solid transparent', color:tab===t.id?C.orange:C.muted, fontSize:12, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap' }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* ── Vaults: Create form ── */}
      {tab==='vaults' && (
        <FbCard title="Create Vault Account for User">
          {msg && <div style={{ padding:'8px 20px', fontSize:12, color:msg.startsWith('✓')?C.green:C.red }}>{msg}</div>}
          <div style={{ padding:'14px 20px', display:'flex', gap:10, flexWrap:'wrap' }}>
            <select value={createForm.userId} onChange={e=>setCreateForm(f=>({...f,userId:e.target.value,name:users.find(u=>u.id===e.target.value)?.email?.split('@')[0]||''}))}
              style={{ background:'#0a0b0e', border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'8px 12px', fontSize:13, minWidth:220 }}>
              <option value="">Select user…</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.email}</option>)}
            </select>
            <input value={createForm.name} onChange={e=>setCreateForm(f=>({...f,name:e.target.value}))} placeholder="Vault name"
              style={{ background:'#0a0b0e', border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'8px 12px', fontSize:13, flex:1, minWidth:160 }}/>
            <Btn onClick={createVault} disabled={creating} icon="plus">{creating?'Creating…':'Create Vault'}</Btn>
          </div>
        </FbCard>
      )}

      {loading ? <Loading/> : (
        <>
          {/* VAULTS */}
          {tab==='vaults' && (
            <FbCard title={`Vault Accounts (${tabData.length})`}>
              <FbTable empty="No vaults found." headers={['ID','Name','Assets','Auto Fuel']} rows={tabData.map(v=>(
                <tr key={v.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(v.id,true)}{td(v.name)}{td(`${(v.assets||[]).length} asset(s)`)}<td style={{ padding:'10px 16px' }}><Badge color={v.autoFuel?'green':'gray'}>{v.autoFuel?'On':'Off'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* TRANSACTIONS */}
          {tab==='transactions' && (
            <FbCard title={`Recent Transactions (${tabData.length})`}>
              <FbTable empty="No transactions." headers={['TX ID','Asset','Amount','Source → Dest','Status','Date']} rows={tabData.map(tx=>(
                <tr key={tx.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((tx.id||'').slice(0,12)+'…',true)}{td(tx.assetId)}{td(tx.amount)}
                  {td(`${tx.source?.name||tx.source?.id||'—'} → ${tx.destination?.name||tx.destination?.id||'—'}`,true)}
                  <td style={{ padding:'10px 16px' }}><Badge color={txStatusColor(tx.status)}>{tx.status}</Badge></td>
                  {td(fmtDate(tx.createdAt),true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* STAKING */}
          {tab==='staking' && (
            <FbCard title={`Staking Positions (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No staking positions." headers={['ID','Asset','Amount','Status','Provider','Vault']} rows={(Array.isArray(tabData)?tabData:[]).map(p=>(
                <tr key={p.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((p.id||'').slice(0,10),true)}{td(p.asset||p.assetId||'—')}{td(p.amount||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={p.status==='ACTIVE'?'green':p.status==='UNSTAKING'?'yellow':'gray'}>{p.status||'—'}</Badge></td>
                  {td(p.providerId||p.provider||'—')}{td(p.vaultAccountId||'—',true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* POLICY ENGINE */}
          {tab==='policy' && (
            <FbCard title="Active TAP Policy Rules">
              {(() => {
                const rules = Array.isArray(tabData) ? tabData : (tabData?.rules||[]);
                return <FbTable empty="No policy rules configured." headers={['Rule ID','Name','Status','Action','Operators']} rows={rules.map((r,i)=>(
                  <tr key={r.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                    {td(r.id||`#${i+1}`,true)}{td(r.name||'—')}
                    <td style={{ padding:'10px 16px' }}><Badge color={r.status==='ACTIVE'?'green':'gray'}>{r.status||'ACTIVE'}</Badge></td>
                    {td(r.action?.type||r.action||'—')}{td((r.operators||[]).map(o=>o.type||o).join(', ')||'—')}
                  </tr>
                ))}/>;
              })()}
            </FbCard>
          )}

          {/* AML / COMPLIANCE */}
          {tab==='compliance' && (
            <FbCard title="AML Screening Policy">
              <div style={{ padding:20 }}>
                {(() => {
                  const policy = Array.isArray(tabData) ? null : tabData;
                  if (!policy) return <div style={{ color:C.muted, fontSize:13 }}>No compliance policy data.</div>;
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:16 }}>
                      {Object.entries(policy).map(([k,v])=>(
                        <div key={k} style={{ background:C.card2, borderRadius:8, padding:14 }}>
                          <div style={{ fontSize:11, color:C.muted, marginBottom:4, textTransform:'uppercase' }}>{k}</div>
                          <div style={{ fontWeight:600, fontSize:13 }}>{String(v)}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            </FbCard>
          )}

          {/* GAS STATION */}
          {tab==='gas-station' && (
            <FbCard title="Gas Station Configuration">
              <div style={{ padding:20 }}>
                {(() => {
                  const gs = Array.isArray(tabData) ? null : tabData;
                  if (!gs) return <div style={{ color:C.muted, fontSize:13 }}>No gas station data. Gas Station may not be enabled on this workspace.</div>;
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:16 }}>
                      {Object.entries(gs).map(([k,v])=>(
                        <div key={k} style={{ background:C.card2, borderRadius:8, padding:14 }}>
                          <div style={{ fontSize:11, color:C.muted, marginBottom:4, textTransform:'uppercase' }}>{k.replace(/([A-Z])/g,' $1').trim()}</div>
                          <div style={{ fontWeight:600, fontSize:13 }}>{typeof v==='object'?JSON.stringify(v):String(v)}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            </FbCard>
          )}

          {/* EXCHANGE */}
          {tab==='exchange' && (
            <FbCard title={`Exchange Accounts (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No exchange accounts." headers={['ID','Name','Type','Status']} rows={(Array.isArray(tabData)?tabData:[]).map(e=>(
                <tr key={e.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(e.id,true)}{td(e.name||'—')}{td(e.type||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={e.status==='CONNECTED'||e.status==='ACTIVE'?'green':'gray'}>{e.status||'—'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* FIAT */}
          {tab==='fiat' && (
            <FbCard title={`Fiat Accounts (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No fiat accounts." headers={['ID','Name','Currency','Balance']} rows={(Array.isArray(tabData)?tabData:[]).map(f=>(
                <tr key={f.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(f.id,true)}{td(f.name||'—')}{td(f.currency||'—')}{td(f.balance||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* NCW */}
          {tab==='ncw' && (
            <FbCard title={`NCW / Embedded Wallets (${Array.isArray(tabData)?tabData.length:0})`}
              action={<Btn onClick={()=>api('/admin/fireblocks/ncw',{method:'POST',body:JSON.stringify({})}).then(r=>r.success&&alert('Wallet created: '+r.data?.walletId))} icon="plus">Create Wallet</Btn>}>
              <FbTable empty="No embedded wallets." headers={['Wallet ID','Status','Created']} rows={(Array.isArray(tabData)?tabData:[]).map(w=>(
                <tr key={w.walletId} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(w.walletId,true)}
                  <td style={{ padding:'10px 16px' }}><Badge color={w.status==='ACTIVE'?'green':'gray'}>{w.status||'—'}</Badge></td>
                  {td(fmtDate(w.createdAt||w.createTime),true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* AUDIT LOGS */}
          {tab==='audit-logs' && (
            <FbCard title="Fireblocks Audit Log">
              <FbTable empty="No audit log entries." headers={['Time','User','Event','ID']} rows={(Array.isArray(tabData)?tabData:[]).map((l,i)=>(
                <tr key={l.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(fmtDate(l.timestamp||l.createdAt),true)}{td(l.user||l.userId||'—')}{td(l.event||l.action||'—')}{td((l.id||'').slice(0,12),true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* NFTs */}
          {tab==='nfts' && (
            <FbCard title={`NFTs (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No NFTs found." headers={['Token ID','Name','Collection','Standard','Blockchain']} rows={(Array.isArray(tabData)?tabData:[]).map(n=>(
                <tr key={n.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((n.id||'').slice(0,14),true)}{td(n.name||'—')}{td(n.collection?.name||'—')}{td(n.standard||'—')}{td(n.blockchainDescriptor||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* EARN */}
          {tab==='earn' && (
            <FbCard title={`Earn / Yield Opportunities (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No earn opportunities." headers={['ID','Asset','APY','Provider','Type']} rows={(Array.isArray(tabData)?tabData:[]).map((e,i)=>(
                <tr key={e.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((e.id||'').slice(0,12),true)}{td(e.assetId||e.asset||'—')}
                  {td(e.apy!=null?`${(e.apy*100).toFixed(2)}%`:'—')}{td(e.providerId||e.provider||'—')}{td(e.type||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* SMART CONTRACTS */}
          {tab==='contracts' && (
            <FbCard title={`Deployed Contracts (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No deployed contracts." headers={['Address','Name','Chain','Status']} rows={(Array.isArray(tabData)?tabData:[]).map((c,i)=>(
                <tr key={c.id||c.contractAddress||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((c.contractAddress||'').slice(0,14)+'…',true)}{td(c.name||c.contractName||'—')}{td(c.assetId||c.blockchain||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={c.status==='COMPLETED'?'green':'gray'}>{c.status||'—'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* WORKSPACE USERS */}
          {tab==='workspace' && (
            <FbCard title="Workspace Console Users">
              <FbTable empty="No workspace users." headers={['ID','Name','Email','Role','Status']} rows={(Array.isArray(tabData)?tabData:[]).map(u=>(
                <tr key={u.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((u.id||'').slice(0,12),true)}{td(`${u.firstName||''} ${u.lastName||''}`.trim()||'—')}{td(u.email||'—')}{td(u.role||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={u.enabled?'green':'gray'}>{u.enabled?'Active':'Disabled'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* COSIGNERS */}
          {tab==='cosigners' && (
            <FbCard title={`Cosigners (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No cosigners." headers={['ID','Name','Version','Paired']} rows={(Array.isArray(tabData)?tabData:[]).map(c=>(
                <tr key={c.cosignerId||c.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((c.cosignerId||c.id||'').slice(0,12),true)}{td(c.name||'—')}{td(c.version||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={c.paired?'green':'gray'}>{c.paired?'Paired':'Unpaired'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* OFF-EXCHANGE */}
          {tab==='off-exchange' && (
            <FbCard title="Off-Exchange Collateral Accounts">
              <div style={{ padding:'12px 20px' }}>
                <div style={{ fontSize:12, color:C.muted, marginBottom:12 }}>
                  Query by passing <code style={{ background:C.card2, padding:'2px 6px', borderRadius:4 }}>?mainExchangeAccountId=ID</code> in the URL.
                </div>
              </div>
              <FbTable empty="No off-exchange data. Provide mainExchangeAccountId query param." headers={['ID','Type','Balance','Currency']} rows={(Array.isArray(tabData)?tabData:[]).map((o,i)=>(
                <tr key={o.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(o.id||'—',true)}{td(o.type||'—')}{td(o.balance||'—')}{td(o.currency||o.assetId||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* NETWORK */}
          {tab==='network' && (
            <FbCard title={`Network Connections (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No network connections." headers={['ID','Name','Status','Direction']} rows={(Array.isArray(tabData)?tabData:[]).map(n=>(
                <tr key={n.localChannel?.id||n.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((n.localChannel?.id||n.id||'').slice(0,12)+'…',true)}{td(n.localChannel?.name||n.name||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={n.status==='CONNECTED'?'green':'gray'}>{n.status||'Unknown'}</Badge></td>
                  {td(n.direction||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}
        </>
      )}
    </div>
  );
};

// ── Sidebar ───────────────────────────────────────────────────
const NAV = [
  { id:'dashboard',  label:'Dashboard',     icon:'dashboard',  sub:'Overview'        },
  { id:'users',      label:'Users',         icon:'users',      sub:'User Management' },
  { id:'security',   label:'Security',      icon:'security',   sub:'Threat Center'   },
  { id:'api',        label:'API Keys',      icon:'api',        sub:'Developer Access'},
  { id:'audit',      label:'Audit Log',     icon:'audit',      sub:'Activity Trail'  },
  { id:'notifs',     label:'Notifications', icon:'bell',       sub:'Alerts'          },
  { id:'fireblocks', label:'Fireblocks',    icon:'fireblocks', sub:'Custody & Vaults'},
  { id:'settings',   label:'Settings',      icon:'settings',   sub:'Configuration'   },
];

const Sidebar = ({ active, setActive, notifications, isMobile, sidebarOpen }) => {
  const unread = notifications.filter(n=>!n.isRead).length;
  const [dark, setDark] = useState(() => {
    const saved = localStorage.getItem('kk_admin_theme');
    if (saved === 'light') { document.documentElement.classList.add('light'); return false; }
    return true;
  });
  const toggleTheme = () => {
    const newDark = !dark;
    setDark(newDark);
    document.documentElement.classList.toggle('light', !newDark);
    localStorage.setItem('kk_admin_theme', newDark ? 'dark' : 'light');
  };
  return (
    <div style={{ width:220, background:C.sidebar, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', height:'100vh', flexShrink:0, ...(isMobile ? { position:'fixed', top:0, left:sidebarOpen?0:-220, zIndex:200, transition:'left 0.25s ease', boxShadow:sidebarOpen?'4px 0 24px rgba(0,0,0,0.4)':'none' } : {}) }}>
      <div style={{ padding:'22px 20px 18px', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:800, letterSpacing:'-0.3px' }}>KryptoKnight</div>
            <div style={{ fontSize:9, color:C.orange, fontWeight:700, letterSpacing:'1.5px' }}>ADMIN</div>
          </div>
        </div>
      </div>
      <nav style={{ flex:1, padding:'14px 10px', overflowY:'auto' }}>
        {NAV.map(item=>{
          const isActive = active===item.id;
          const badge = item.id==='notifs'&&unread>0?unread:null;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:9, cursor:'pointer', border:'none', marginBottom:3, textAlign:'left', transition:'all .15s', background:isActive?C.orangeBg:'transparent', borderLeft:isActive?`3px solid ${C.orange}`:'3px solid transparent' }}
              onMouseEnter={e=>{ if(!isActive) e.currentTarget.style.background=C.border; }}
              onMouseLeave={e=>{ if(!isActive) e.currentTarget.style.background='transparent'; }}>
              <Icon d={Icons[item.icon]} size={16} color={isActive?C.orange:C.muted} stroke/>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:isActive?C.orange:C.text }}>{item.label}</div>
              </div>
              {badge && <span style={{ background:C.red, color:'#fff', fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:10 }}>{badge}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{ padding:'14px 10px', borderTop:`1px solid ${C.border}` }}>
        <button onClick={toggleTheme} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:9, cursor:'pointer', border:'none', background:'transparent', color:C.muted, fontSize:13, fontWeight:600, marginBottom:3 }}
          onMouseEnter={e=>e.currentTarget.style.background=C.border}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <Icon d={dark ? Icons.sun : Icons.moon} size={16} color={C.muted} stroke/>
          {dark ? 'Light Mode' : 'Dark Mode'}
        </button>
        <button onClick={logout} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:9, cursor:'pointer', border:'none', background:'transparent', color:C.muted, fontSize:13, fontWeight:600 }}
          onMouseEnter={e=>e.currentTarget.style.background=C.border}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <Icon d={Icons.logout} size={16} color={C.muted} stroke/> Sign Out
        </button>
      </div>
    </div>
  );
};

const PROFILE_NAV = [
  { id:'dashboard', label:'Overview',  icon:'dashboard'  },
  { id:'security',  label:'Security',  icon:'security'   },
  { id:'api',       label:'API Keys',  icon:'api'        },
  { id:'notifs',    label:'Alerts',    icon:'bell'       },
];

const Topbar = ({ active, setActive, reload, loading, isMobile, onMenuClick }) => {
  const page = NAV.find(n=>n.id===active)||NAV[0];
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);

  return (
    <div style={{ height:56, background:C.sidebar, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', flexShrink:0 }}>
      {/* Hamburger (mobile only) + Breadcrumb */}
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        {isMobile && (
          <button onClick={onMenuClick} style={{ background:'none', border:'none', cursor:'pointer', color:C.muted, padding:4, borderRadius:6, display:'flex', flexDirection:'column', gap:4 }}>
            <span style={{ display:'block', width:18, height:2, background:C.text, borderRadius:2 }}/>
            <span style={{ display:'block', width:18, height:2, background:C.text, borderRadius:2 }}/>
            <span style={{ display:'block', width:18, height:2, background:C.text, borderRadius:2 }}/>
          </button>
        )}
        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:C.muted }}>
          <span style={{ color:C.orange }}>Admin</span>
          <span>/</span>
          <span style={{ color:C.text, fontWeight:600 }}>{page.label}</span>
        </div>
      </div>

      {/* Right controls */}
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        <button onClick={reload} disabled={loading} style={{ background:'none', border:'none', cursor:'pointer', color:C.muted, opacity:loading?.5:1, padding:4, borderRadius:6 }}>
          <Icon d={Icons.refresh} size={15} stroke/>
        </button>

        {/* Profile dropdown */}
        <div ref={ref} style={{ position:'relative' }}>
          <button onClick={() => setOpen(o => !o)}
            style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:10, cursor:'pointer', border:`1px solid transparent`, background:'transparent', transition:'all .15s' }}
            onMouseEnter={e => { e.currentTarget.style.background = C.border; e.currentTarget.style.borderColor = C.border2; }}
            onMouseLeave={e => { if (!open) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderColor = 'transparent'; } }}>
            <div style={{ width:30, height:30, borderRadius:'50%', background:C.orangeBg, border:`1px solid ${C.orange}40`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:C.orange, flexShrink:0 }}>A</div>
            <span style={{ fontSize:13, fontWeight:600, color:C.text }}>Admin</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
          </button>

          {open && (
            <div style={{ position:'absolute', right:0, top:'calc(100% + 6px)', width:200, background:C.card, border:`1px solid ${C.border}`, borderRadius:12, boxShadow:'0 8px 32px rgba(0,0,0,.3)', zIndex:100, overflow:'hidden' }}>
              {/* Header */}
              <div style={{ padding:'12px 16px', borderBottom:`1px solid ${C.border}`, fontSize:12, color:C.muted }}>
                <div style={{ fontWeight:700, color:C.text, fontSize:13 }}>Administrator</div>
                <div>admin@krypto-knight.com</div>
              </div>
              {/* Items */}
              <div style={{ padding:'4px 0' }}>
                {PROFILE_NAV.map(item => {
                  const isActive = active === item.id;
                  return (
                    <button key={item.id} onClick={() => { setActive(item.id); setOpen(false); }}
                      style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 16px', border:'none', background:'transparent', cursor:'pointer', color: isActive ? C.orange : C.muted, fontSize:13, fontWeight:600, textAlign:'left', transition:'all .12s' }}
                      onMouseEnter={e => { e.currentTarget.style.background = C.border; e.currentTarget.style.color = C.text; }}
                      onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = isActive ? C.orange : C.muted; }}>
                      <Icon d={Icons[item.icon]} size={14} color="currentColor" stroke/>
                      {item.label}
                      {isActive && <div style={{ marginLeft:'auto', width:6, height:6, borderRadius:'50%', background:C.orange }}/>}
                    </button>
                  );
                })}
              </div>
              {/* Sign out */}
              <div style={{ borderTop:`1px solid ${C.border}`, padding:'4px 0' }}>
                <button onClick={logout}
                  style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 16px', border:'none', background:'transparent', cursor:'pointer', color:C.muted, fontSize:13, fontWeight:600, textAlign:'left', transition:'all .12s' }}
                  onMouseEnter={e => { e.currentTarget.style.background = C.redBg; e.currentTarget.style.color = C.red; }}
                  onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = C.muted; }}>
                  <Icon d={Icons.logout} size={14} color="currentColor" stroke/>
                  Sign Out
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Root App ──────────────────────────────────────────────────
const App = () => {
  const isMobile = useIsMobile();
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [active, setActive] = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [users, setUsers] = useState([]);
  const [apiKeysList, setApiKeysList] = useState([]);
  const [audit, setAudit] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [settings, setSettings] = useState({});
  const [stats, setStats] = useState({});

  const reload = useCallback(async () => {
    setLoading(true);
    try {
      const [s, u, k, a, ses, n, set] = await Promise.all([
        api('/admin/stats'),
        api('/admin/users'),
        api('/admin/api-keys'),
        api('/admin/audit?limit=200'),
        api('/admin/sessions'),
        api('/admin/notifications'),
        api('/admin/settings'),
      ]);
      if (s.success) setStats(s.data);
      if (u.success) setUsers(u.data);
      if (k.success) setApiKeysList(k.data);
      if (a.success) setAudit(a.data);
      if (ses.success) setSessions(ses.data);
      if (n.success) setNotifications(n.data);
      if (set.success) setSettings(set.data);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { reload(); }, []);

  const pages = {
    dashboard:  () => <PageDashboard stats={stats} audit={audit}/>,
    users:      () => <PageUsers users={users} sessions={sessions} reload={reload}/>,
    security:   () => <PageSecurity users={users} sessions={sessions} stats={stats} reload={reload}/>,
    api:        () => <PageAPIKeys apiKeys={apiKeysList} reload={reload}/>,
    audit:      () => <PageAudit audit={audit}/>,
    notifs:     () => <PageNotifications notifications={notifications} reload={reload}/>,
    fireblocks: () => <PageFireblocks users={users}/>,
    settings:   () => <PageSettings settings={settings} reload={reload}/>,
  };
  const Page = pages[active] || pages.dashboard;

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      {/* Mobile backdrop — tap to close sidebar */}
      {isMobile && sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:199 }}/>
      )}
      <Sidebar active={active} setActive={(id) => { setActive(id); if (isMobile) setSidebarOpen(false); }} notifications={notifications} isMobile={isMobile} sidebarOpen={sidebarOpen}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <Topbar active={active} setActive={setActive} reload={reload} loading={loading} isMobile={isMobile} onMenuClick={() => setSidebarOpen(o => !o)}/>
        <div style={{ flex:1, overflowY:'auto', background:C.bg }}>
          {loading ? <Loading/> : <Page/>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
