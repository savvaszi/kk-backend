<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KryptoKnight — Admin</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0b0e; color: #e8eaf0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: #111318; }
  ::-webkit-scrollbar-thumb { background: #2a2d36; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #00e676; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Auth ──────────────────────────────────────────────────────
const token = localStorage.getItem('kk_token');
if (!token) window.location.replace('/login.html');

async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers || {}) },
  });
  if (res.status === 401) { localStorage.removeItem('kk_token'); window.location.replace('/login.html'); }
  return res.json();
}

function logout() { localStorage.removeItem('kk_token'); window.location.replace('/login.html'); }

// ── Helpers ───────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return 'never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function displayName(u) {
  if (!u) return '';
  const n = [u.firstName, u.lastName].filter(Boolean).join(' ');
  return n || u.username || u.email || '';
}

// ── Colors ────────────────────────────────────────────────────
const C = {
  bg:'#0a0b0e', sidebar:'#0e1015', card:'#13161d', card2:'#181c25',
  border:'#1e2230', border2:'#252a38',
  orange:'#00e676', orangeD:'#00b359', orangeBg:'rgba(0,230,118,0.10)',
  text:'#e8eaf0', muted:'#7a8099',
  green:'#22c55e', greenBg:'rgba(34,197,94,0.12)',
  red:'#ef4444', redBg:'rgba(239,68,68,0.12)',
  yellow:'#eab308', yellowBg:'rgba(234,179,8,0.12)',
  blue:'#3b82f6', blueBg:'rgba(59,130,246,0.12)',
  purple:'#a855f7', purpleBg:'rgba(168,85,247,0.12)',
};

// ── Icons ─────────────────────────────────────────────────────

  <svg width={size} height={size} viewBox="0 0 24 24" fill={stroke?'none':color}
    stroke={stroke?color:'none'} strokeWidth={stroke?2:0} strokeLinecap="round" strokeLinejoin="round">
    {Array.isArray(d) ? d.map((p,i)=><path key={i} d={p}/>) : <path d={d}/>}
  </svg>
);

  security:'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10',

  api:'M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4',

  settings:'M12 15a3 3 0 100-6 3 3 0 000 6 M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z',
  bell:'M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9 M13.73 21a2 2 0 01-3.46 0',
  search:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0',
  plus:'M12 5v14M5 12h14',
  download:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4 M7 10l5 5 5-5 M12 15V3',
  eye:'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8 M12 9a3 3 0 100 6 3 3 0 000-6',
  ban:'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636',
  edit:'M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7 M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z',
  trash:'M3 6h18 M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2',
  copy:'M8 17H5a2 2 0 01-2-2V5a2 2 0 012-2h8a2 2 0 012 2v3m-2 11h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z',
  check:'M20 6L9 17l-5-5',
  refresh:'M23 4v6h-6 M20.49 15a9 9 0 11-2.12-9.36L23 10',
  alert:'M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0 M12 9v4 M12 17h.01',
  key:'M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4',
  globe:'M12 22a10 10 0 100-20 10 10 0 000 20 M2 12h20 M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z',
  logout:'M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4 M16 17l5-5-5-5 M21 12H9',
  lock:'M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2 M17 11V7a5 5 0 00-10 0v4',
  activity:'M22 12h-4l-3 9L9 3l-3 9H2',
  fireblocks:'M12 2L2 7l10 5 10-5-10-5 M2 17l10 5 10-5 M2 12l10 5 10-5',
  send:'M22 2L11 13 M22 2l-7 20-4-9-9-4 20-7',
  arrowDown:'M12 5v14 M5 12l7 7 7-7',
  network:'M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v4m0 0H5m4 0h10M9 7v10m0 0H5a2 2 0 01-2-2v-4m6 6h10a2 2 0 002-2v-4m0 0h-6',
};

// ── Shared UI ─────────────────────────────────────────────────
const Badge = ({ color='orange', children, small }) => {
  const m = { orange:{bg:C.orangeBg,text:C.orange}, green:{bg:C.greenBg,text:C.green}, red:{bg:C.redBg,text:C.red}, yellow:{bg:C.yellowBg,text:C.yellow}, blue:{bg:C.blueBg,text:C.blue}, purple:{bg:C.purpleBg,text:C.purple}, gray:{bg:'#1e2230',text:C.muted} };
  const c = m[color] || m.gray;
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:small?'2px 7px':'3px 10px', borderRadius:6, fontSize:small?10:11, fontWeight:600, background:c.bg, color:c.text, whiteSpace:'nowrap' }}>{children}</span>;
};

const Btn = ({ children, variant='primary', size='sm', onClick, icon, disabled, style={} }) => {
  const [h, sH] = useState(false);
  const base = { display:'inline-flex', alignItems:'center', gap:6, cursor:'pointer', border:'none', borderRadius:8, fontWeight:600, transition:'all .15s', fontSize:size==='sm'?12:14, padding:size==='sm'?'7px 14px':'10px 20px', opacity:disabled?.5:1, ...style };
  const v = { primary:{background:h?C.orangeD:C.orange,color:'#fff'}, ghost:{background:h?C.border2:'transparent',color:C.text,border:`1px solid ${C.border}`}, danger:{background:h?'#b91c1c':C.redBg,color:C.red,border:`1px solid rgba(239,68,68,.2)`} };
  return <button style={{...base,...v[variant]}} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} onClick={onClick} disabled={disabled}>{icon&&<Icon d={Icons[icon]} size={13} color='currentColor' stroke/>}{children}</button>;
};

const StatCard = ({ label, value, sub, icon, color='orange', delta }) => {
  const cm = { orange:C.orange, green:C.green, blue:C.blue, purple:C.purple, red:C.red, yellow:C.yellow };
  const bm = { orange:C.orangeBg, green:C.greenBg, blue:C.blueBg, purple:C.purpleBg, red:C.redBg, yellow:C.yellowBg };
  const c = cm[color], bg = bm[color];
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'20px 22px', flex:1, minWidth:0 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
        <span style={{ color:C.muted, fontSize:12, fontWeight:500 }}>{label}</span>
        <div style={{ background:bg, borderRadius:8, padding:8 }}><Icon d={Icons[icon]} size={15} color={c} stroke/></div>
      </div>
      <div style={{ fontSize:28, fontWeight:700, color:C.text, letterSpacing:'-0.5px' }}>{value ?? '—'}</div>
      {sub && <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>{delta!==undefined&&<span style={{ color:delta>=0?C.green:C.red, marginRight:5 }}>{delta>=0?'▲':'▼'} {Math.abs(delta)}%</span>}{sub}</div>}
    </div>
  );
};

const Loading = () => (
  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:C.muted, fontSize:14 }}>Loading…</div>
);

// ── Page: Dashboard ───────────────────────────────────────────
const PageDashboard = ({ stats, audit }) => (
  <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
    <div style={{ marginBottom:28 }}>
      <div style={{ fontSize:22, fontWeight:700 }}>Platform Overview</div>
      <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>{new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} — Live</div>
    </div>
    <div style={{ display:'flex', gap:16, marginBottom:20 }}>
      <StatCard label="Total Users"       value={stats.totalUsers}       icon="users"    color="blue"   sub="registered"/>
      <StatCard label="Active Sessions"   value={stats.activeSessions}   icon="activity" color="green"  sub="right now"/>
      <StatCard label="API Keys Issued"   value={stats.activeApiKeys}    icon="key"      color="orange" sub="active keys"/>
      <StatCard label="Flagged Accounts"  value={stats.flaggedAccounts}  icon="alert"    color="red"    sub="need review"/>
    </div>
    <div style={{ display:'flex', gap:16, marginBottom:24 }}>
      <StatCard label="Connected Wallets" value={stats.connectedWallets} icon="wallet"   color="purple" sub="total"/>
      <StatCard label="2FA Adoption"      value={stats.twoFaAdoption!=null?stats.twoFaAdoption+'%':null} icon="lock" color="yellow" sub="of all users"/>
      <StatCard label="Avg Security Score"value={stats.avgSecurityScore!=null?stats.avgSecurityScore+'/100':null} icon="security" color="blue" sub="platform wide"/>
      <StatCard label="Banned Accounts"   value={stats.bannedAccounts}   icon="ban"      color="red"    sub="this month"/>
    </div>
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'20px 22px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18 }}>
        <div style={{ fontWeight:600, fontSize:14 }}>Recent Audit Events</div>
        <Badge color="gray">Live</Badge>
      </div>
      {audit.slice(0,8).map((e,i) => {
        const sv = { info:'blue', warning:'yellow', danger:'red', success:'green' };
        const c = sv[e.severity] || 'gray';
        return (
          <div key={e.id} style={{ display:'flex', alignItems:'flex-start', gap:12, padding:'10px 0', borderTop:i>0?`1px solid ${C.border}`:'none' }}>
            <div style={{ width:8, height:8, borderRadius:'50%', background:C[c]||C.muted, marginTop:5, flexShrink:0 }}/>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:600 }}>{e.action}</div>
              <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{e.userName} · {e.detail}</div>
            </div>
            <div style={{ fontSize:10, color:C.muted, whiteSpace:'nowrap' }}>{timeAgo(e.createdAt)}</div>
          </div>
        );
      })}
      {audit.length === 0 && <div style={{ color:C.muted, fontSize:13 }}>No audit events yet.</div>}
    </div>
  </div>
);

// ── Page: Users ───────────────────────────────────────────────
const PageUsers = ({ users, reload }) => {
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [selected, setSelected] = useState(null);
  const [acting, setActing] = useState(null);

  const filtered = users.filter(u => {
    const q = search.toLowerCase();
    const match = displayName(u).toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || u.username.toLowerCase().includes(q);
    return filter === 'all' ? match : match && u.status === filter;
  });

  const banUser = async (u) => {
    setActing(u.id);
    await api(`/admin/users/${u.id}/ban`, { method:'POST', body:JSON.stringify({}) });
    await reload();
    setActing(null);
    if (selected?.id === u.id) setSelected(null);
  };
  const unbanUser = async (u) => {
    setActing(u.id);
    await api(`/admin/users/${u.id}/unban`, { method:'POST', body:JSON.stringify({}) });
    await reload();
    setActing(null);
  };

  if (selected) {
    const u = users.find(x=>x.id===selected.id) || selected;
    return (
      <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
        <button onClick={()=>setSelected(null)} style={{ display:'flex', alignItems:'center', gap:6, background:'none', border:'none', color:C.muted, cursor:'pointer', fontSize:13, marginBottom:20, padding:0 }}>← Back to Users</button>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:28, marginBottom:20, display:'flex', alignItems:'center', gap:24 }}>
          <div style={{ width:72, height:72, borderRadius:'50%', background:`hsl(${u.id.charCodeAt(0)*7},40%,22%)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, fontWeight:700, border:`3px solid ${C.border2}` }}>
            {(displayName(u)||'?')[0].toUpperCase()}
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:20, fontWeight:700 }}>{displayName(u)}</div>
            <div style={{ fontSize:13, color:C.muted, marginTop:3 }}>@{u.username} · {u.email}</div>
            <div style={{ display:'flex', gap:8, marginTop:10 }}>
              <Badge color={u.status==='active'?'green':u.status==='banned'?'red':'yellow'}>{u.status}</Badge>
              <Badge color="gray">Level {u.level}</Badge>
              {u.twoFaEnabled && <Badge color="green">2FA On</Badge>}
              <Badge color={u.securityScore>=60?'green':u.securityScore>=40?'yellow':'red'}>Score: {u.securityScore}/100</Badge>
            </div>
          </div>
          <div style={{ display:'flex', gap:10 }}>
            {u.status!=='banned'
              ? <Btn variant="danger" icon="ban" onClick={()=>banUser(u)} disabled={acting===u.id}>Ban User</Btn>
              : <Btn variant="ghost" icon="check" onClick={()=>unbanUser(u)} disabled={acting===u.id}>Unban</Btn>
            }
          </div>
        </div>
        <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:22 }}>
          <div style={{ fontWeight:600, marginBottom:16, fontSize:14 }}>Account Details</div>
          {[
            ['Email', u.email], ['Username', '@'+u.username], ['Status', u.status],
            ['Joined', fmtDate(u.createdAt)], ['Last Seen', timeAgo(u.lastSeenAt)],
            ['Country', u.country||'—'], ['Phone', u.phone||'—'],
            ['Email Verified', u.emailVerified?'Yes':'No'],
            ['2FA', u.twoFaEnabled?'Enabled':'Disabled'],
            ['Security Score', u.securityScore+'/100'],
          ].map(([k,v])=>(
            <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:`1px solid ${C.border}`, fontSize:13 }}>
              <span style={{ color:C.muted }}>{k}</span><span>{String(v)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
        <div>
          <div style={{ fontSize:22, fontWeight:700 }}>User Management</div>
          <div style={{ fontSize:13, color:C.muted, marginTop:4 }}>{users.length} total users</div>
        </div>
      </div>
      <div style={{ display:'flex', gap:12, marginBottom:20, alignItems:'center' }}>
        <div style={{ position:'relative', flex:1, maxWidth:320 }}>
          <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)' }}><Icon d={Icons.search} size={14} color={C.muted} stroke/></div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search users…"
            style={{ width:'100%', background:C.card, border:`1px solid ${C.border}`, borderRadius:8, padding:'9px 12px 9px 36px', color:C.text, fontSize:13, outline:'none' }}/>
        </div>
        {['all','active','pending','banned'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{ padding:'8px 16px', borderRadius:8, border:`1px solid ${filter===f?C.orange:C.border}`, background:filter===f?C.orangeBg:'transparent', color:filter===f?C.orange:C.muted, fontSize:12, fontWeight:600, cursor:'pointer', textTransform:'capitalize' }}>{f}</button>
        ))}
      </div>
      <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, overflow:'hidden' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
          <thead>
            <tr style={{ borderBottom:`1px solid ${C.border}` }}>
              {['User','Email','Status','Score','2FA','Joined','Actions'].map(h=>(
                <th key={h} style={{ padding:'12px 16px', textAlign:'left', color:C.muted, fontWeight:600, fontSize:11 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((u,i)=>(
              <tr key={u.id} style={{ borderBottom:`1px solid ${C.border}` }}
                onMouseEnter={e=>e.currentTarget.style.background=C.card2}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ width:32, height:32, borderRadius:'50%', background:`hsl(${u.id.charCodeAt(0)*7},40%,22%)`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700 }}>
                      {(displayName(u)||'?')[0].toUpperCase()}
                    </div>
                    <div>
                      <div style={{ fontWeight:600 }}>{displayName(u)}</div>
                      <div style={{ fontSize:11, color:C.muted }}>@{u.username}</div>
                    </div>
                  </div>
                </td>
                <td style={{ padding:'13px 16px', color:C.muted }}>{u.email}</td>
                <td style={{ padding:'13px 16px' }}><Badge color={u.status==='active'?'green':u.status==='banned'?'red':'yellow'} small>{u.status}</Badge></td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style={{ width:50, height:4, background:C.border2, borderRadius:3 }}>
                      <div style={{ width:`${u.securityScore}%`, height:'100%', background:u.securityScore>=60?C.green:u.securityScore>=40?C.yellow:C.red, borderRadius:3 }}/>
                    </div>
                    <span style={{ color:u.securityScore>=60?C.green:u.securityScore>=40?C.yellow:C.red, fontWeight:600 }}>{u.securityScore}</span>
                  </div>
                </td>
                <td style={{ padding:'13px 16px' }}>{u.twoFaEnabled?<Badge color="green" small>On</Badge>:<Badge color="red" small>Off</Badge>}</td>
                <td style={{ padding:'13px 16px', color:C.muted }}>{fmtDate(u.createdAt)}</td>
                <td style={{ padding:'13px 16px' }}>
                  <div style={{ display:'flex', gap:6 }}>
                    <button onClick={()=>setSelected(u)} style={{ background:C.blueBg, border:'none', borderRadius:6, padding:'5px 8px', color:C.blue, cursor:'pointer', fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:4 }}>
                      <Icon d={Icons.eye} size={12} color={C.blue} stroke/> View
                    </button>
                    {u.status!=='banned'
                      ? <button onClick={()=>banUser(u)} disabled={acting===u.id} style={{ background:C.redBg, border:'none', borderRadius:6, padding:'5px 10px', color:C.red, cursor:'pointer', fontSize:11, fontWeight:600 }}>Ban</button>
                      : <button onClick={()=>unbanUser(u)} disabled={acting===u.id} style={{ background:C.greenBg, border:'none', borderRadius:6, padding:'5px 10px', color:C.green, cursor:'pointer', fontSize:11, fontWeight:600 }}>Unban</button>
                    }
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>

  const toggle = (key) => setLocal(p=>({ ...p, [key]: p[key]==='true'?'false':'true' }));

  const sections = [
    { title:'General', icon:'settings', fields:[

      { label:'Support Email', key:'support_email', type:'text' },

      { label:'New Registrations', key:'new_registrations', type:'toggle' },

      { label:'Minimum Security Score', key:'min_security_score', type:'text' },

    { title:'Notifications', icon:'bell', fields:[
      { label:'Admin Alert Email', key:'admin_alert_email', type:'text' },

      { label:'New User Alerts', key:'new_user_alerts', type:'toggle' },
      { label:'API Abuse Alerts', key:'api_abuse_alerts', type:'toggle' },
    ]},
  ];

  return (
    <div style={{ padding:'28px 32px', overflowY:'auto', height:'100%' }}>
      <div style={{ fontSize:22, fontWeight:700, marginBottom:4 }}>Platform Settings</div>

            <div style={{ background:C.orangeBg, borderRadius:8, padding:8 }}><Icon d={Icons[s.icon]} size={15} color={C.orange} stroke/></div>
            <div style={{ fontWeight:600, fontSize:14 }}>{s.title}</div>

          {s.fields.map(f=>(

              <label style={{ fontSize:13 }}>{f.label}</label>
              {f.type==='toggle'

                    <div style={{ position:'absolute', width:18, height:18, borderRadius:'50%', background:'#fff', top:3, left:local[f.key]==='true'?23:3, transition:'left .2s' }}/>
                  </div>
                : <input value={local[f.key]||''} onChange={e=>set(f.key,e.target.value)} style={{ background:C.card2, border:`1px solid ${C.border}`, borderRadius:8, padding:'8px 14px', color:C.text, fontSize:13, outline:'none', width:260 }}/>

  );

  const TABS = [
    { id:'vaults',       label:'Vaults' },
    { id:'transactions', label:'Transactions' },
    { id:'staking',      label:'Staking' },
    { id:'policy',       label:'Policy Engine' },
    { id:'compliance',   label:'AML/Compliance' },
    { id:'gas-station',  label:'Gas Station' },
    { id:'exchange',     label:'Exchange' },
    { id:'fiat',         label:'Fiat' },
    { id:'ncw',          label:'NCW Wallets' },
    { id:'audit-logs',   label:'Audit Logs' },
    { id:'nfts',         label:'NFTs' },
    { id:'earn',         label:'Earn/Yield' },
    { id:'contracts',    label:'Smart Contracts' },
    { id:'workspace',    label:'Workspace Users' },
    { id:'cosigners',    label:'Cosigners' },
    { id:'off-exchange', label:'Off-Exchange' },
    { id:'network',      label:'Network' },
  ];

  const td = (content, mono=false) => (
    <td style={{ padding:'10px 16px', fontFamily:mono?'monospace':'inherit', fontSize:mono?11:13, color:mono?C.muted:C.text }}>{content}</td>
  );

  return (
    <div style={{ padding:28, display:'flex', flexDirection:'column', gap:18 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:20, fontWeight:700, display:'flex', alignItems:'center', gap:10 }}>
            <Icon d={Icons.fireblocks} size={20} color={C.orange} stroke/> Fireblocks Integration
          </div>
          <div style={{ fontSize:12, color:C.muted, marginTop:4 }}>Full MPC custody — vaults, policy, AML, staking, NCW, earn &amp; more</div>
        </div>
        <Badge color="green">Connected</Badge>
      </div>

      {/* Tab bar — scrollable */}
      <div style={{ overflowX:'auto', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', gap:2, minWidth:'max-content' }}>
          {TABS.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ padding:'8px 14px', background:'none', border:'none', borderBottom:tab===t.id?`2px solid ${C.orange}`:'2px solid transparent', color:tab===t.id?C.orange:C.muted, fontSize:12, fontWeight:600, cursor:'pointer', whiteSpace:'nowrap' }}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* ── Vaults: Create form ── */}
      {tab==='vaults' && (
        <FbCard title="Create Vault Account for User">
          {msg && <div style={{ padding:'8px 20px', fontSize:12, color:msg.startsWith('✓')?C.green:C.red }}>{msg}</div>}
          <div style={{ padding:'14px 20px', display:'flex', gap:10, flexWrap:'wrap' }}>
            <select value={createForm.userId} onChange={e=>setCreateForm(f=>({...f,userId:e.target.value,name:users.find(u=>u.id===e.target.value)?.email?.split('@')[0]||''}))}
              style={{ background:'#0a0b0e', border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'8px 12px', fontSize:13, minWidth:220 }}>
              <option value="">Select user…</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.email}</option>)}
            </select>
            <input value={createForm.name} onChange={e=>setCreateForm(f=>({...f,name:e.target.value}))} placeholder="Vault name"
              style={{ background:'#0a0b0e', border:`1px solid ${C.border}`, borderRadius:8, color:C.text, padding:'8px 12px', fontSize:13, flex:1, minWidth:160 }}/>
            <Btn onClick={createVault} disabled={creating} icon="plus">{creating?'Creating…':'Create Vault'}</Btn>
          </div>
        </FbCard>
      )}

      {loading ? <Loading/> : (
        <>
          {/* VAULTS */}
          {tab==='vaults' && (
            <FbCard title={`Vault Accounts (${tabData.length})`}>
              <FbTable empty="No vaults found." headers={['ID','Name','Assets','Auto Fuel']} rows={tabData.map(v=>(
                <tr key={v.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(v.id,true)}{td(v.name)}{td(`${(v.assets||[]).length} asset(s)`)}<td style={{ padding:'10px 16px' }}><Badge color={v.autoFuel?'green':'gray'}>{v.autoFuel?'On':'Off'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* TRANSACTIONS */}
          {tab==='transactions' && (
            <FbCard title={`Recent Transactions (${tabData.length})`}>
              <FbTable empty="No transactions." headers={['TX ID','Asset','Amount','Source → Dest','Status','Date']} rows={tabData.map(tx=>(
                <tr key={tx.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((tx.id||'').slice(0,12)+'…',true)}{td(tx.assetId)}{td(tx.amount)}
                  {td(`${tx.source?.name||tx.source?.id||'—'} → ${tx.destination?.name||tx.destination?.id||'—'}`,true)}
                  <td style={{ padding:'10px 16px' }}><Badge color={txStatusColor(tx.status)}>{tx.status}</Badge></td>
                  {td(fmtDate(tx.createdAt),true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* STAKING */}
          {tab==='staking' && (
            <FbCard title={`Staking Positions (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No staking positions." headers={['ID','Asset','Amount','Status','Provider','Vault']} rows={(Array.isArray(tabData)?tabData:[]).map(p=>(
                <tr key={p.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((p.id||'').slice(0,10),true)}{td(p.asset||p.assetId||'—')}{td(p.amount||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={p.status==='ACTIVE'?'green':p.status==='UNSTAKING'?'yellow':'gray'}>{p.status||'—'}</Badge></td>
                  {td(p.providerId||p.provider||'—')}{td(p.vaultAccountId||'—',true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* POLICY ENGINE */}
          {tab==='policy' && (
            <FbCard title="Active TAP Policy Rules">
              {(() => {
                const rules = Array.isArray(tabData) ? tabData : (tabData?.rules||[]);
                return <FbTable empty="No policy rules configured." headers={['Rule ID','Name','Status','Action','Operators']} rows={rules.map((r,i)=>(
                  <tr key={r.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                    {td(r.id||`#${i+1}`,true)}{td(r.name||'—')}
                    <td style={{ padding:'10px 16px' }}><Badge color={r.status==='ACTIVE'?'green':'gray'}>{r.status||'ACTIVE'}</Badge></td>
                    {td(r.action?.type||r.action||'—')}{td((r.operators||[]).map(o=>o.type||o).join(', ')||'—')}
                  </tr>
                ))}/>;
              })()}
            </FbCard>
          )}

          {/* AML / COMPLIANCE */}
          {tab==='compliance' && (
            <FbCard title="AML Screening Policy">
              <div style={{ padding:20 }}>
                {(() => {
                  const policy = Array.isArray(tabData) ? null : tabData;
                  if (!policy) return <div style={{ color:C.muted, fontSize:13 }}>No compliance policy data.</div>;
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))', gap:16 }}>
                      {Object.entries(policy).map(([k,v])=>(
                        <div key={k} style={{ background:C.card2, borderRadius:8, padding:14 }}>
                          <div style={{ fontSize:11, color:C.muted, marginBottom:4, textTransform:'uppercase' }}>{k}</div>
                          <div style={{ fontWeight:600, fontSize:13 }}>{String(v)}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            </FbCard>
          )}

          {/* GAS STATION */}
          {tab==='gas-station' && (
            <FbCard title="Gas Station Configuration">
              <div style={{ padding:20 }}>
                {(() => {
                  const gs = Array.isArray(tabData) ? null : tabData;
                  if (!gs) return <div style={{ color:C.muted, fontSize:13 }}>No gas station data. Gas Station may not be enabled on this workspace.</div>;
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:16 }}>
                      {Object.entries(gs).map(([k,v])=>(
                        <div key={k} style={{ background:C.card2, borderRadius:8, padding:14 }}>
                          <div style={{ fontSize:11, color:C.muted, marginBottom:4, textTransform:'uppercase' }}>{k.replace(/([A-Z])/g,' $1').trim()}</div>
                          <div style={{ fontWeight:600, fontSize:13 }}>{typeof v==='object'?JSON.stringify(v):String(v)}</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
              </div>
            </FbCard>
          )}

          {/* EXCHANGE */}
          {tab==='exchange' && (
            <FbCard title={`Exchange Accounts (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No exchange accounts." headers={['ID','Name','Type','Status']} rows={(Array.isArray(tabData)?tabData:[]).map(e=>(
                <tr key={e.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(e.id,true)}{td(e.name||'—')}{td(e.type||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={e.status==='CONNECTED'||e.status==='ACTIVE'?'green':'gray'}>{e.status||'—'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* FIAT */}
          {tab==='fiat' && (
            <FbCard title={`Fiat Accounts (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No fiat accounts." headers={['ID','Name','Currency','Balance']} rows={(Array.isArray(tabData)?tabData:[]).map(f=>(
                <tr key={f.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(f.id,true)}{td(f.name||'—')}{td(f.currency||'—')}{td(f.balance||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* NCW */}
          {tab==='ncw' && (
            <FbCard title={`NCW / Embedded Wallets (${Array.isArray(tabData)?tabData.length:0})`}
              action={<Btn onClick={()=>api('/admin/fireblocks/ncw',{method:'POST',body:JSON.stringify({})}).then(r=>r.success&&alert('Wallet created: '+r.data?.walletId))} icon="plus">Create Wallet</Btn>}>
              <FbTable empty="No embedded wallets." headers={['Wallet ID','Status','Created']} rows={(Array.isArray(tabData)?tabData:[]).map(w=>(
                <tr key={w.walletId} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(w.walletId,true)}
                  <td style={{ padding:'10px 16px' }}><Badge color={w.status==='ACTIVE'?'green':'gray'}>{w.status||'—'}</Badge></td>
                  {td(fmtDate(w.createdAt||w.createTime),true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* AUDIT LOGS */}
          {tab==='audit-logs' && (
            <FbCard title="Fireblocks Audit Log">
              <FbTable empty="No audit log entries." headers={['Time','User','Event','ID']} rows={(Array.isArray(tabData)?tabData:[]).map((l,i)=>(
                <tr key={l.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(fmtDate(l.timestamp||l.createdAt),true)}{td(l.user||l.userId||'—')}{td(l.event||l.action||'—')}{td((l.id||'').slice(0,12),true)}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* NFTs */}
          {tab==='nfts' && (
            <FbCard title={`NFTs (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No NFTs found." headers={['Token ID','Name','Collection','Standard','Blockchain']} rows={(Array.isArray(tabData)?tabData:[]).map(n=>(
                <tr key={n.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((n.id||'').slice(0,14),true)}{td(n.name||'—')}{td(n.collection?.name||'—')}{td(n.standard||'—')}{td(n.blockchainDescriptor||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* EARN */}
          {tab==='earn' && (
            <FbCard title={`Earn / Yield Opportunities (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No earn opportunities." headers={['ID','Asset','APY','Provider','Type']} rows={(Array.isArray(tabData)?tabData:[]).map((e,i)=>(
                <tr key={e.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((e.id||'').slice(0,12),true)}{td(e.assetId||e.asset||'—')}
                  {td(e.apy!=null?`${(e.apy*100).toFixed(2)}%`:'—')}{td(e.providerId||e.provider||'—')}{td(e.type||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* SMART CONTRACTS */}
          {tab==='contracts' && (
            <FbCard title={`Deployed Contracts (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No deployed contracts." headers={['Address','Name','Chain','Status']} rows={(Array.isArray(tabData)?tabData:[]).map((c,i)=>(
                <tr key={c.id||c.contractAddress||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((c.contractAddress||'').slice(0,14)+'…',true)}{td(c.name||c.contractName||'—')}{td(c.assetId||c.blockchain||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={c.status==='COMPLETED'?'green':'gray'}>{c.status||'—'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* WORKSPACE USERS */}
          {tab==='workspace' && (
            <FbCard title="Workspace Console Users">
              <FbTable empty="No workspace users." headers={['ID','Name','Email','Role','Status']} rows={(Array.isArray(tabData)?tabData:[]).map(u=>(
                <tr key={u.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((u.id||'').slice(0,12),true)}{td(`${u.firstName||''} ${u.lastName||''}`.trim()||'—')}{td(u.email||'—')}{td(u.role||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={u.enabled?'green':'gray'}>{u.enabled?'Active':'Disabled'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* COSIGNERS */}
          {tab==='cosigners' && (
            <FbCard title={`Cosigners (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No cosigners." headers={['ID','Name','Version','Paired']} rows={(Array.isArray(tabData)?tabData:[]).map(c=>(
                <tr key={c.cosignerId||c.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((c.cosignerId||c.id||'').slice(0,12),true)}{td(c.name||'—')}{td(c.version||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={c.paired?'green':'gray'}>{c.paired?'Paired':'Unpaired'}</Badge></td>
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* OFF-EXCHANGE */}
          {tab==='off-exchange' && (
            <FbCard title="Off-Exchange Collateral Accounts">
              <div style={{ padding:'12px 20px' }}>
                <div style={{ fontSize:12, color:C.muted, marginBottom:12 }}>
                  Query by passing <code style={{ background:C.card2, padding:'2px 6px', borderRadius:4 }}>?mainExchangeAccountId=ID</code> in the URL.
                </div>
              </div>
              <FbTable empty="No off-exchange data. Provide mainExchangeAccountId query param." headers={['ID','Type','Balance','Currency']} rows={(Array.isArray(tabData)?tabData:[]).map((o,i)=>(
                <tr key={o.id||i} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td(o.id||'—',true)}{td(o.type||'—')}{td(o.balance||'—')}{td(o.currency||o.assetId||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}

          {/* NETWORK */}
          {tab==='network' && (
            <FbCard title={`Network Connections (${Array.isArray(tabData)?tabData.length:0})`}>
              <FbTable empty="No network connections." headers={['ID','Name','Status','Direction']} rows={(Array.isArray(tabData)?tabData:[]).map(n=>(
                <tr key={n.localChannel?.id||n.id} style={{ borderBottom:`1px solid ${C.border}` }}>
                  {td((n.localChannel?.id||n.id||'').slice(0,12)+'…',true)}{td(n.localChannel?.name||n.name||'—')}
                  <td style={{ padding:'10px 16px' }}><Badge color={n.status==='CONNECTED'?'green':'gray'}>{n.status||'Unknown'}</Badge></td>
                  {td(n.direction||'—')}
                </tr>
              ))}/>
            </FbCard>
          )}
        </>
      )}
    </div>
  );
};

// ── Sidebar ───────────────────────────────────────────────────
const NAV = [
  { id:'dashboard',  label:'Dashboard',     icon:'dashboard',  sub:'Overview'        },
  { id:'users',      label:'Users',         icon:'users',      sub:'User Management' },
  { id:'security',   label:'Security',      icon:'security',   sub:'Threat Center'   },
  { id:'api',        label:'API Keys',      icon:'api',        sub:'Developer Access'},
  { id:'audit',      label:'Audit Log',     icon:'audit',      sub:'Activity Trail'  },
  { id:'notifs',     label:'Notifications', icon:'bell',       sub:'Alerts'          },
  { id:'fireblocks', label:'Fireblocks',    icon:'fireblocks', sub:'Custody & Vaults'},
  { id:'settings',   label:'Settings',      icon:'settings',   sub:'Configuration'   },
];

const Sidebar = ({ active, setActive, notifications }) => {
  const unread = notifications.filter(n=>!n.isRead).length;
  return (
    <div style={{ width:220, background:C.sidebar, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', height:'100vh', flexShrink:0 }}>
      <div style={{ padding:'22px 20px 18px', borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:800, letterSpacing:'-0.3px' }}>KryptoKnight</div>
            <div style={{ fontSize:9, color:C.orange, fontWeight:700, letterSpacing:'1.5px' }}>ADMIN</div>
          </div>
        </div>
      </div>
      <nav style={{ flex:1, padding:'14px 10px', overflowY:'auto' }}>
        {NAV.map(item=>{
          const isActive = active===item.id;
          const badge = item.id==='notifs'&&unread>0?unread:null;
          return (
            <button key={item.id} onClick={()=>setActive(item.id)} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:9, cursor:'pointer', border:'none', marginBottom:3, textAlign:'left', transition:'all .15s', background:isActive?C.orangeBg:'transparent', borderLeft:isActive?`3px solid ${C.orange}`:'3px solid transparent' }}
              onMouseEnter={e=>{ if(!isActive) e.currentTarget.style.background=C.border; }}
              onMouseLeave={e=>{ if(!isActive) e.currentTarget.style.background='transparent'; }}>
              <Icon d={Icons[item.icon]} size={16} color={isActive?C.orange:C.muted} stroke/>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:13, fontWeight:600, color:isActive?C.orange:C.text }}>{item.label}</div>
              </div>
              {badge && <span style={{ background:C.red, color:'#fff', fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:10 }}>{badge}</span>}
            </button>
          );
        })}
      </nav>
      <div style={{ padding:'14px 10px', borderTop:`1px solid ${C.border}` }}>
        <button onClick={logout} style={{ width:'100%', display:'flex', alignItems:'center', gap:12, padding:'10px 12px', borderRadius:9, cursor:'pointer', border:'none', background:'transparent', color:C.muted, fontSize:13, fontWeight:600 }}
          onMouseEnter={e=>e.currentTarget.style.background=C.border}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <Icon d={Icons.logout} size={16} color={C.muted} stroke/> Sign Out
        </button>
      </div>
    </div>
  );
};

const Topbar = ({ active, reload, loading }) => {
  const page = NAV.find(n=>n.id===active)||NAV[0];
  return (
    <div style={{ height:56, background:C.sidebar, borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 28px', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:C.muted }}>
        <span style={{ color:C.orange }}>Admin</span><span>/</span><span style={{ color:C.text, fontWeight:600 }}>{page.label}</span>
      </div>
      <button onClick={reload} disabled={loading} style={{ background:'none', border:'none', cursor:'pointer', color:C.muted, opacity:loading?.5:1 }}><Icon d={Icons.refresh} size={15} stroke/></button>
    </div>
  );
};

// ── Root App ──────────────────────────────────────────────────
const App = () => {
  const [active, setActive] = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [users, setUsers] = useState([]);
  const [apiKeysList, setApiKeysList] = useState([]);
  const [audit, setAudit] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [settings, setSettings] = useState({});
  const [stats, setStats] = useState({});

  const reload = useCallback(async () => {
    setLoading(true);
    try {
      const [s, u, k, a, ses, n, set] = await Promise.all([
        api('/admin/stats'),
        api('/admin/users'),
        api('/admin/api-keys'),
        api('/admin/audit?limit=200'),
        api('/admin/sessions'),
        api('/admin/notifications'),
        api('/admin/settings'),
      ]);
      if (s.success) setStats(s.data);
      if (u.success) setUsers(u.data);
      if (k.success) setApiKeysList(k.data);
      if (a.success) setAudit(a.data);
      if (ses.success) setSessions(ses.data);
      if (n.success) setNotifications(n.data);
      if (set.success) setSettings(set.data);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { reload(); }, []);

  const pages = {
    dashboard:  () => <PageDashboard stats={stats} audit={audit}/>,
    users:      () => <PageUsers users={users} reload={reload}/>,
    security:   () => <PageSecurity users={users} sessions={sessions} stats={stats} reload={reload}/>,
    api:        () => <PageAPIKeys apiKeys={apiKeysList} reload={reload}/>,
    audit:      () => <PageAudit audit={audit}/>,
    notifs:     () => <PageNotifications notifications={notifications} reload={reload}/>,
    fireblocks: () => <PageFireblocks users={users}/>,
    settings:   () => <PageSettings settings={settings} reload={reload}/>,
  };
  const Page = pages[active] || pages.dashboard;

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      <Sidebar active={active} setActive={setActive} notifications={notifications}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        <Topbar active={active} reload={reload} loading={loading}/>
        <div style={{ flex:1, overflowY:'auto', background:C.bg }}>
          {loading ? <Loading/> : <Page/>}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
